<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FFFAF3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="세이브포인트">
<title>세이브 포인트 · 5일 챌린지</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFFAF3; --card:#FFFFFF; --ink:#1A1A2E; --sub:#555; --faint:#999;
  --line:#F2EDE4; --line2:#E6DECF;
  --p:#FF8C42; --p-deep:#F0761F; --p-soft:#FFF0E6;
  --green:#27AE60; --green-deep:#1E8449; --green-soft:#E8F8F0; --green-mid:#2ECC71;
  --gold:#D99A22; --gold-soft:#FBF3E1; --flame:#E8571F; --flame-soft:#FDEEE6;
  --red:#E74C3C; --red-soft:#FDECEA; --amber:#B7791F; --amber-soft:#FBF3DE;
  --blue:#3498DB; --blue-soft:#EAF4FB;
  --r-lg:22px; --r-md:16px; --r-sm:12px;
  --sh:0 1px 2px rgba(26,26,46,.04),0 6px 24px rgba(26,26,46,.06);
  --sh-lift:0 4px 12px rgba(26,26,46,.08),0 16px 40px rgba(26,26,46,.12);
}
html{font-size:16px}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:#EDE8E0; color:var(--ink); min-height:100dvh;
  display:flex; justify-content:center;
  font-feature-settings:'tnum';
  -webkit-font-smoothing:antialiased;
}
#app{
  width:100%; max-width:440px; min-height:100dvh; background:var(--bg);
  position:relative; overflow-x:hidden;
  background-image:radial-gradient(circle at 20% -5%, #FFFDF8 0%, transparent 45%);
}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font:inherit;color:inherit}
h1,h2,h3{font-weight:800;letter-spacing:-.02em}
.num{font-feature-settings:'tnum';letter-spacing:-.03em}

/* ---------- layout ---------- */
.screen{display:none;padding-bottom:calc(96px + env(safe-area-inset-bottom))}
.screen.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 18px 4px}
.wordmark{font-size:16px;font-weight:900;letter-spacing:-.02em;display:flex;align-items:center;gap:6px}
.wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--p);display:inline-block;box-shadow:0 0 0 3px var(--p-soft)}
.iconbtn{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--sub);transition:background .15s}
.iconbtn:active{background:var(--line)}
/* 듀오링고식 상단 스탯 필 */
.stat-pill{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:900;padding:5px 9px;border-radius:100px;white-space:nowrap;
  background:var(--card);border:1px solid var(--line);box-shadow:var(--sh);letter-spacing:-.02em;transition:transform .12s}
.stat-pill:active{transform:scale(.93)}
.stat-pill .si{font-size:14px}
/* v3식 3열 스탯 로우 */
.pstat-row{display:flex;border-top:1px solid var(--line);margin-top:12px;padding-top:11px}
.pstat{flex:1;text-align:center}
.pstat b{font-size:15px;font-weight:900;display:block;letter-spacing:-.02em}
.pstat span{font-size:11px;color:var(--faint);font-weight:700;margin-top:2px;display:block}
.close-btn{width:100%;padding:15px;border-radius:16px;background:var(--ink);color:#fff;font-size:15px;font-weight:900;
  display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 8px 22px rgba(26,31,28,.22);transition:transform .12s;
  position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
.close-btn .fill{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,rgba(255,164,94,.9),rgba(240,118,31,.95));border-radius:inherit}
.close-btn .fill.cancel{background:linear-gradient(90deg,rgba(231,76,60,.35),rgba(231,76,60,.6))}
.close-btn.holding{transform:scale(.975)}
.close-btn.holding .fill{width:100%;transition:width 1.2s linear}
.close-btn .lb{position:relative;z-index:1;display:flex;align-items:center;gap:9px}
.close-btn.done{background:var(--green-soft);color:var(--green-deep);box-shadow:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
.close-btn.done.holding{transform:scale(.975)}
.save-preview{width:100%;margin-top:9px;padding:11px 14px;border-radius:13px;background:var(--gold-soft);color:var(--amber);
  font-size:13px;font-weight:700;text-align:center;border:1px solid #F1E3C2;transition:transform .12s}
.save-preview b{font-weight:900;color:var(--gold)}
.save-preview:active{transform:scale(.98)}
.save-preview.done{background:var(--green-soft);color:var(--green-deep);border-color:#CBE6DA}
.save-preview.done b{color:var(--green-deep)}
.save-preview.flat{background:var(--bg);color:var(--faint);border-color:var(--line);pointer-events:none}
.hero-edit{position:absolute;top:16px;right:16px;z-index:2;font-size:11.5px;font-weight:800;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:100px;padding:6px 12px}
.hero-edit:active{background:rgba(255,255,255,.3)}
/* 스트릭 캘린더 */
.st-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:13px;font-weight:700;color:var(--sub);position:relative}
.st-day.ok{background:var(--green);color:#fff;font-weight:900}
.st-day.rep{background:var(--gold);color:#fff;font-weight:900}
.st-day.over{background:var(--red-soft);color:var(--red)}
.st-day.pend{background:var(--amber-soft);color:var(--amber)}
.st-day.dim{opacity:.3}
.st-day.today::after{content:'';position:absolute;inset:-3px;border:2px solid var(--ink);border-radius:14px}
.mini-bar{height:8px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:6px}
.mini-bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#FFA45E,var(--p));transition:width .6s ease}
.section-label{font-size:12px;font-weight:800;color:var(--faint);letter-spacing:.04em;padding:14px 22px 6px}
.card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh);margin:0 16px 10px;padding:16px 18px;border:1px solid rgba(236,232,222,.6)}

/* ---------- bottom nav ---------- */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);display:flex;align-items:stretch;
  padding:6px 8px calc(8px + env(safe-area-inset-bottom));z-index:60}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 0;border-radius:14px;transition:transform .12s}
.nav-item:active{transform:scale(.93)}
.nav-item .ic{font-size:21px;filter:grayscale(1) opacity(.45);transition:filter .15s}
.nav-item .lb{font-size:10.5px;font-weight:700;color:var(--faint)}
.nav-item.on .ic{filter:none}
.nav-item.on .lb{color:var(--p-deep)}
.nav-plus{flex:1;display:flex;align-items:center;justify-content:center}
.nav-plus .circle{width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#FFA45E,var(--p-deep));
  color:#fff;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(255,140,66,.45);transform:translateY(-12px);transition:transform .15s}
.nav-plus:active .circle{transform:translateY(-12px) scale(.92)}

/* ---------- home ---------- */
.hero{margin:8px 16px 10px;padding:18px 20px 16px;border-radius:22px;
  background:linear-gradient(155deg,#FF9C50 0%,#FF8C42 55%,#F0761F 100%);
  color:#fff;box-shadow:0 12px 32px rgba(240,118,31,.32);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-60px;top:-70px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 65%)}
.hero .cap{font-size:12.5px;font-weight:600;opacity:.8}
.hero .big{font-size:30px;font-weight:900;letter-spacing:-.035em;margin:3px 0 2px}
.hero .meta{font-size:13px;opacity:.65;font-weight:500}
.hero .bar{height:7px;background:rgba(255,255,255,.2);border-radius:5px;margin-top:12px;overflow:hidden}
.hero .bar i{display:block;height:100%;background:linear-gradient(90deg,#FFE3C9,#FFF6EC);border-radius:5px;transition:width .8s cubic-bezier(.3,.8,.3,1)}
.hero .barrow{display:flex;justify-content:space-between;font-size:11.5px;opacity:.75;margin-top:6px;font-weight:600}

.pace-card{position:relative}
.pace-head{display:flex;align-items:center;justify-content:space-between}
.pace-title{font-size:13px;font-weight:800;color:var(--sub);display:flex;align-items:center;gap:6px}
.badge{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:100px}
.badge.ok{background:var(--green-soft);color:var(--green-deep)}
.badge.warn{background:var(--amber-soft);color:var(--amber)}
.badge.over{background:var(--red-soft);color:var(--red)}
.pace-num{font-size:31px;font-weight:900;letter-spacing:-.03em;margin:10px 0 2px}
.pace-num small{font-size:16px;font-weight:700;color:var(--sub)}
.pace-sub{font-size:13px;color:var(--faint);font-weight:600}
.gauge{margin-top:16px;height:12px;background:var(--line);border-radius:7px;overflow:hidden;position:relative}
.gauge i{display:block;height:100%;border-radius:7px;transition:width .7s cubic-bezier(.3,.8,.3,1)}
.gauge i.ok{background:linear-gradient(90deg,var(--green-mid),var(--green))}
.gauge i.warn{background:linear-gradient(90deg,#E4B33C,var(--amber))}
.gauge i.over{background:linear-gradient(90deg,#D96A5B,var(--red))}
.gauge-row{display:flex;justify-content:space-between;gap:14px;margin-top:8px;font-size:12.5px;color:var(--faint);font-weight:600}
.gauge-row span:first-child{white-space:nowrap}
.gauge-row span:last-child{text-align:right}

.duo{display:flex;gap:10px;margin:0 16px 10px}
.duo .card{flex:1;margin:0;padding:14px 15px}
.mini-cap{font-size:12px;font-weight:700;color:var(--faint)}
.mini-num{font-size:19px;font-weight:900;margin-top:4px;letter-spacing:-.02em}
.mini-sub{font-size:12px;color:var(--faint);font-weight:600;margin-top:3px}

.banner{margin:0 16px 10px;padding:13px 16px;border-radius:var(--r-md);display:flex;align-items:center;gap:11px;
  font-size:13px;font-weight:700;box-shadow:var(--sh);border:1px solid transparent;width:calc(100% - 32px);text-align:left}
.banner.todo{background:var(--blue-soft);color:var(--blue);border-color:#D8E7F1}
.banner.close{background:var(--card);color:var(--ink);border-color:var(--line)}
.banner .arrow{margin-left:auto;color:var(--faint);font-weight:400}
.banner .bic{font-size:20px}

/* ---------- record tab ---------- */
.q-card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh);margin:0 16px 12px;padding:18px 20px;border:1px solid rgba(236,232,222,.6)}
.q-date{font-size:15px;font-weight:800}
.q-sub{font-size:12.5px;color:var(--faint);font-weight:600;margin-top:2px}
.q-actions{display:flex;gap:8px;margin-top:14px}
.chip-btn{flex:1;padding:11px 4px;border-radius:12px;font-size:13.5px;font-weight:800;transition:transform .12s;text-align:center}
.chip-btn:active{transform:scale(.96)}
.chip-btn.ghost{background:var(--bg);color:var(--sub);border:1px solid var(--line2)}
.chip-btn.solid{background:var(--p);color:#fff}
.chip-btn.gold{background:var(--gold-soft);color:var(--gold);border:1px solid #F1E3C2}

.cal{margin:0 16px 12px;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh);padding:14px 12px;border:1px solid rgba(236,232,222,.6)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.cal-title{font-size:15.5px;font-weight:800}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:32px;height:32px;border-radius:10px;color:var(--sub);font-size:15px}
.cal-nav button:active{background:var(--bg)}
.cal-dow{font-size:11px;font-weight:700;color:var(--faint);text-align:center;padding:2px 0 4px}
.caldrow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{min-height:52px;display:flex;flex-direction:column;align-items:stretch;gap:1px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--sub);position:relative;padding:3px 2px 2px;overflow:hidden}
.cal-day:active{background:var(--bg)}
.cal-day.dim{opacity:.32}
.cal-day .dn{display:flex;align-items:center;justify-content:center;gap:3px;height:17px;flex-shrink:0}
.cal-day.today .dn{background:var(--ink);color:#fff;font-weight:800;border-radius:6px;width:22px;height:22px;margin:0 auto}
.cal-day .st{width:5px;height:5px;border-radius:50%}
.st.ok{background:var(--green-mid)}
.st.over{background:var(--red)}
.st.pend{background:var(--amber);animation:pulse 1.6s infinite}
.st.rep{background:var(--gold)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.cal-ev{font-size:8px;font-weight:700;line-height:1.35;padding:0 2px 0 3px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent;text-align:left}
.cal-ev.paid{opacity:.4;text-decoration:line-through}
.cal-more{font-size:8px;font-weight:800;color:var(--faint);padding-left:3px}
.legend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:11.5px;color:var(--faint);font-weight:600}
.legend span{display:flex;align-items:center;gap:5px}
.legend .st{width:7px;height:7px}

.day-group{margin:0 16px 10px;background:var(--card);border-radius:var(--r-md);box-shadow:var(--sh);overflow:hidden;border:1px solid rgba(236,232,222,.6)}
.day-head{display:flex;align-items:center;padding:13px 18px 10px;gap:8px}
.day-head .d{font-size:13.5px;font-weight:800}
.day-head .tag{font-size:10.5px;font-weight:800;padding:2.5px 8px;border-radius:100px}
.tag.ok{background:var(--green-soft);color:var(--green-deep)}
.tag.over{background:var(--red-soft);color:var(--red)}
.tag.pend{background:var(--amber-soft);color:var(--amber)}
.tag.rep{background:var(--gold-soft);color:var(--gold)}
.day-head .sum{margin-left:auto;font-size:13px;font-weight:800;color:var(--sub)}
.exp-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-top:1px solid var(--line)}
.exp-ic{width:36px;height:36px;border-radius:11px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.exp-name{font-size:14px;font-weight:700}
.exp-src{font-size:11px;color:var(--faint);font-weight:600;margin-top:1px}
.exp-amt{margin-left:auto;font-size:14.5px;font-weight:800;white-space:nowrap}
.exp-del{color:var(--faint);font-size:15px;padding:6px 2px 6px 8px}
.empty{padding:44px 20px;text-align:center;color:var(--faint)}
.empty .e-ic{font-size:38px;margin-bottom:10px}
.empty .e-t{font-size:14.5px;font-weight:700;color:var(--sub)}
.empty .e-s{font-size:13px;margin-top:5px;line-height:1.5}
.add-row{width:100%;padding:16px;text-align:center;font-size:14.5px;font-weight:800;color:var(--p-deep);background:var(--card)}

/* ---------- sheets ---------- */
.dimmer{position:fixed;inset:0;background:rgba(20,24,21,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .22s}
.dimmer.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,105%);width:100%;max-width:440px;
  background:var(--card);border-radius:26px 26px 0 0;z-index:90;transition:transform .3s cubic-bezier(.32,.9,.35,1);
  max-height:88dvh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.sheet.show{transform:translate(-50%,0)}
.sheet-grip{width:40px;height:4.5px;border-radius:3px;background:var(--line2);margin:11px auto 4px}
.sheet-head{padding:10px 24px 4px;display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.sheet-x{font-size:20px;color:var(--faint);padding:6px}
.sheet-body{padding:12px 24px 8px}

.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:800;color:var(--faint);margin-bottom:7px}
.field input[type=text],.field input[type=number],.field input[type=date],.field input[type=time],.field select,.field textarea{
  width:100%;padding:14px 16px;border:1.5px solid var(--line2);border-radius:14px;font-size:16px;font-weight:700;
  background:var(--bg);outline:none;transition:border-color .15s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--p);background:#fff}
.field textarea{min-height:110px;font-weight:500;font-size:14px;line-height:1.5;resize:none}
.won-wrap{position:relative}
.won-wrap input{padding-right:44px !important;text-align:right;font-size:20px !important;font-weight:800 !important}
.won-wrap::after{content:'원';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--sub)}
.cta{width:100%;padding:17px;border-radius:16px;background:var(--p);color:#fff;font-size:16.5px;font-weight:800;transition:transform .12s,opacity .15s;margin-top:6px}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.35}
.cta.dark{background:var(--ink)}
.cta.ghost{background:var(--bg);color:var(--sub);border:1.5px solid var(--line2)}

.seg{display:flex;background:var(--bg);border-radius:14px;padding:4px;gap:4px;margin-bottom:18px}
.seg button{flex:1;padding:10px 2px;border-radius:11px;font-size:13.5px;font-weight:800;color:var(--faint);transition:all .15s}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(26,31,28,.09)}

.ocr-drop{border:2px dashed var(--line2);border-radius:18px;padding:34px 20px;text-align:center;background:var(--bg);transition:border-color .15s;width:100%}
.ocr-drop:active{border-color:var(--p)}
.ocr-drop .oi{font-size:36px}
.ocr-drop .ot{font-size:14.5px;font-weight:800;margin-top:10px}
.ocr-drop .os{font-size:12.5px;color:var(--faint);font-weight:600;margin-top:4px;line-height:1.5}
.ocr-status{text-align:center;padding:26px 10px}
.spinner{width:34px;height:34px;border:3.5px solid var(--line);border-top-color:var(--p);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cand-box{background:var(--green-soft);border:1.5px solid #CBE6DA;border-radius:16px;padding:14px 16px;margin-bottom:16px}
.cand-box .ct{font-size:12px;font-weight:800;color:var(--green-deep);margin-bottom:6px}
.cand-box .cv{font-size:13.5px;font-weight:600;color:var(--sub);line-height:1.6;word-break:break-all;max-height:76px;overflow-y:auto}

.calc-preview{background:var(--card);border-radius:18px;padding:20px;margin-top:22px;box-shadow:var(--sh)}
.calc-row{display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:var(--sub);padding:7px 0}
.calc-row.total{border-top:1.5px solid var(--line);margin-top:6px;padding-top:13px;font-size:16px;color:var(--ink);font-weight:800}
.calc-row .neg{color:var(--red)}
.calc-row .pos{color:var(--green)}

/* ---------- celebration ---------- */
#celebrate{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(16,22,18,.72);backdrop-filter:blur(6px)}
#celebrate.show{display:flex;animation:fadein .2s ease}
.cel-card{background:var(--card);border-radius:28px;padding:38px 30px 28px;text-align:center;width:min(320px,86vw);position:relative;overflow:visible;animation:pop .45s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.cel-emoji{font-size:56px;animation:bounce .7s cubic-bezier(.3,1.6,.4,1)}
@keyframes bounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.25) rotate(6deg)}100%{transform:scale(1)}}
.cel-title{font-size:20px;font-weight:900;margin-top:14px;letter-spacing:-.02em}
.cel-amt{font-size:32px;font-weight:900;color:var(--green-deep);margin-top:6px;letter-spacing:-.03em}
.cel-sub{font-size:13.5px;color:var(--sub);font-weight:600;margin-top:8px;line-height:1.6}
.cel-streak{display:inline-flex;align-items:center;gap:6px;background:var(--flame-soft);color:var(--flame);font-weight:800;font-size:14px;border-radius:100px;padding:7px 16px;margin-top:14px}
.cel-btn{margin-top:20px;width:100%;padding:15px;border-radius:15px;background:var(--ink);color:#fff;font-size:15px;font-weight:800}
.confetti{position:absolute;width:9px;height:14px;top:-10px;opacity:0;pointer-events:none}
@keyframes confall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(340px) rotate(540deg)}}
.coin{position:absolute;font-size:22px;pointer-events:none;animation:coindrop 1s ease-in forwards}
@keyframes coindrop{0%{opacity:0;transform:translateY(-60px) scale(.6)}25%{opacity:1}100%{opacity:0;transform:translateY(120px) scale(1)}}

.toast{position:fixed;bottom:calc(110px + env(safe-area-inset-bottom));left:50%;transform:translate(-50%,20px);background:var(--ink);color:#fff;
  padding:13px 22px;border-radius:100px;font-size:14px;font-weight:700;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh-lift)}
.toast.show{opacity:1;transform:translate(-50%,0)}

.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 2px;border-bottom:1px solid var(--line);font-size:15px;font-weight:700;width:100%;text-align:left}
.settings-row .sv{color:var(--faint);font-weight:600;font-size:14px}
.settings-row.danger{color:var(--red)}
.hint{font-size:12px;color:var(--faint);font-weight:600;line-height:1.6;margin-top:14px}
.st-hero{text-align:center;padding:6px 0 16px}
.st-hero .fl{font-size:44px}
.st-hero .n{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-top:4px}
.st-hero .b{font-size:13px;color:var(--faint);font-weight:700;margin-top:4px}

/* ---------- home: 날짜 스트립 ---------- */
.datestrip{display:flex;align-items:center;gap:10px;margin:2px 16px 10px}
.datestrip .nav{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;
  color:var(--sub);background:var(--card);border:1px solid var(--line);box-shadow:var(--sh);flex-shrink:0;transition:transform .12s}
.datestrip .nav:active{transform:scale(.9)}
.datestrip .nav:disabled{opacity:.3;pointer-events:none}
.datestrip .mid{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh);padding:9px 6px}
.datestrip .dt{font-size:15px;font-weight:900;letter-spacing:-.02em}
.datestrip .sub{font-size:11.5px;font-weight:800;margin-top:2px}
.datestrip .sub.ok{color:var(--green-deep)}
.datestrip .sub.pend{color:var(--amber)}
.datestrip .sub.live{color:var(--p-deep)}
.datestrip .sub.soon{color:var(--faint)}

/* ---------- home: 큰 스트릭 카드 ---------- */
.streak-card{display:flex;align-items:center;gap:16px;margin:0 16px 10px;padding:18px 20px;border-radius:var(--r-lg);
  background:linear-gradient(150deg,#FFF3EC,#FDE6DA);border:1px solid #F6D7C6;box-shadow:var(--sh)}
.streak-card:active{transform:scale(.99)}
.flame-big{font-size:46px;line-height:1;filter:drop-shadow(0 3px 8px rgba(232,87,31,.35));animation:flamebob 2.4s ease-in-out infinite}
@keyframes flamebob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.06)}}
.streak-n{font-size:30px;font-weight:900;letter-spacing:-.03em;color:var(--flame);line-height:1.05}
.streak-sub{font-size:12.5px;font-weight:800;color:var(--amber);margin-top:3px}
.streak-dots{display:flex;gap:7px;margin-left:auto;flex-shrink:0}
.sdot{width:16px;height:16px;border-radius:50%;background:var(--line2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff}
.sdot.ok{background:var(--green)}
.sdot.over{background:var(--red)}
.sdot.pend{background:var(--amber)}
.sdot.today{box-shadow:0 0 0 3px var(--flame-soft),0 0 0 4px var(--flame)}

/* ---------- onboarding ---------- */
#onb{position:fixed;inset:0;z-index:150;display:none;justify-content:center;background:#EDE8E0}
#onb.show{display:flex}
.onb-inner{width:100%;max-width:440px;background:var(--bg);display:flex;flex-direction:column;min-height:100dvh;
  padding:calc(34px + env(safe-area-inset-top)) 28px calc(28px + env(safe-area-inset-bottom));position:relative;overflow-y:auto}
.onb-progress{display:flex;gap:6px;margin-bottom:8px}
.onb-progress i{height:4px;border-radius:3px;flex:1;background:var(--line2);transition:background .2s}
.onb-progress i.on{background:var(--p)}
.onb-back{position:absolute;top:calc(30px + env(safe-area-inset-top));left:18px;width:34px;height:34px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--sub)}
.onb-back:active{background:var(--line)}
.onb-mid{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
.onb-hero-emoji{font-size:66px;line-height:1;animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.onb-title{font-size:27px;font-weight:900;letter-spacing:-.03em;margin-top:20px;line-height:1.3}
.onb-title em{font-style:normal;color:var(--p-deep)}
.onb-body{font-size:15px;color:var(--sub);font-weight:600;line-height:1.7;margin-top:14px;word-break:keep-all}
.onb-body b{color:var(--ink);font-weight:800}
.onb-tag{display:inline-block;font-size:12.5px;font-weight:800;color:var(--p-deep);background:var(--p-soft);border-radius:100px;padding:6px 14px;margin-bottom:6px}
.onb-form{width:100%;max-width:320px;margin:28px auto 0;display:grid;gap:24px;text-align:left}
.onb-field{margin:0}
.onb-field label{display:block;margin-bottom:9px;font-size:13.5px;font-weight:800;color:var(--sub)}
.onb-field input[type=text]{width:100%;height:58px;padding:0 18px;border:1.5px solid var(--line2);border-radius:16px;
  background:var(--card);outline:none;font-size:18px;font-weight:800;transition:border-color .15s,box-shadow .15s,background .15s;-webkit-appearance:none}
.onb-field input[type=text]:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p-soft)}
.onb-field input[type=text][readonly]{background:#F8F3EB;color:var(--ink)}
.onb-field .won-wrap input{height:58px;padding-left:18px !important;padding-right:50px !important;font-size:22px !important}
.onb-field .won-wrap::after{right:18px}
.onb-help{margin-top:8px;font-size:12.5px;color:#817D76;font-weight:600;line-height:1.5;word-break:keep-all}
.onb-help strong{color:var(--p-deep);font-weight:800}
.onb-foot{margin-top:24px}
.onb-mock{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh);padding:16px 18px;margin:22px auto 0;max-width:320px;text-align:left}
.onb-mock .mrow{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;color:var(--sub);padding:7px 0}
.onb-mock .mrow b{color:var(--ink);font-weight:800;margin-left:auto}

/* ---------- coach-mark 튜토리얼 ---------- */
#coach{position:fixed;inset:0;z-index:170;pointer-events:none;display:none}
#coach.show{display:block}
/* 클릭만 차단하는 투명 패널(어두운 처리는 구멍의 box-shadow가 둥글게 담당) */
.coach-blk{position:absolute;background:transparent;pointer-events:auto}
/* 구멍: 둥근 링 + 둥근 어둠을 box-shadow로 한 번에 → 모서리 깔끔 (inline으로 세팅) */
.coach-hole{position:absolute;pointer-events:none;border-radius:16px;
  transition:left .28s cubic-bezier(.3,.8,.3,1),top .28s cubic-bezier(.3,.8,.3,1),width .28s,height .28s,box-shadow .2s}
.coach-tip{position:absolute;max-width:300px;background:var(--card);border-radius:16px;box-shadow:var(--sh-lift);
  padding:15px 17px;pointer-events:auto;z-index:172;animation:fadein .25s ease}
.coach-tip .ct-title{font-size:15px;font-weight:900;letter-spacing:-.01em}
.coach-tip .ct-body{font-size:13px;color:var(--sub);font-weight:600;line-height:1.65;margin-top:6px}
.coach-tip .ct-body b{color:var(--ink);font-weight:800}
.coach-tip .ct-actions{display:flex;gap:8px;margin-top:13px;justify-content:flex-end;align-items:center}
.coach-tip .ct-btn{font-size:13px;font-weight:800;padding:9px 16px;border-radius:11px;background:var(--p);color:#fff}
.coach-tip .ct-skip{font-size:12px;font-weight:700;color:var(--faint);padding:9px 6px}
</style>

<script>
'use strict';
/* ================================================================
   세이브 포인트 v6 — 5일 챌린지 프로토타입 (단일 파일)
   가설 검증용: 입력할 때마다 즉시 반응하는 보상
   (스트릭 · 오늘 남은 돈 즉시 차감 · 마감 시 칭찬/훈계 문구)
   데이터: localStorage (기기 저장) / 내보내기·가져오기 지원
================================================================ */

// ---------- state ----------
const KEY='savepoint_v6';
const PARTICIPANT_KEY='budget-book-participant';
const SESSION_KEY='budget-book-session-id';
const EVENT_OUTBOX_KEY='budget-book-event-outbox';
const APP_VERSION='v6';
const LOG_SCHEMA_VERSION=1;
const LOG_ENDPOINT='https://script.google.com/macros/s/AKfycbzXq2PDdvtG9MJe4X6RLRxxJj0T_7EPKdSOoNrgMzajmj9qB-2DBbjwl9TQ4pydOwQ/exec';
const SESSION_TIMEOUT_MS=30*60*1000;
const EVENT_OUTBOX_MAX=500;
const EVENT_MAX_AGE_MS=14*24*60*60*1000;
const CHALLENGE_DAYS=5;
const DEFAULT_BUDGET=150000; // 5일치 기본 예산
const DEFAULT={v:1,onboarded:false,nickname:'',startDate:null,challengeId:null,
  challengeCompletedLogged:false,challengePeriodEndedLogged:false,
  budget5:DEFAULT_BUDGET,exp:[],conf:{},seenMilestones:[]};
let S=load();
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(KEY));
    if(s&&s.v===1){
      const o=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),s);
      if(!Array.isArray(o.exp))o.exp=[];
      if(!o.conf)o.conf={};
      if(!Array.isArray(o.seenMilestones))o.seenMilestones=[];
      if(!o.budget5||o.budget5<=0)o.budget5=DEFAULT_BUDGET;
      return o;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function randomId(){
  if(window.crypto&&typeof window.crypto.randomUUID==='function')return window.crypto.randomUUID();
  return uid()+'-'+uid();
}

// ---------- date helpers ----------
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// 하루의 경계는 자정이 아니라 새벽 5시. 5시 전이면 아직 '어제'로 친다.
const DAY_START_HOUR=5;
function today(){
  const d=new Date();
  if(d.getHours()<DAY_START_HOUR)d.setDate(d.getDate()-1);
  return ds(d);
}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dim(y,m){return new Date(y,m,0).getDate();} // m: 1-12
const DOW=['일','월','화','수','목','금','토'];
function fmtDate(s,withDow){const d=pd(s);const t=today();
  let base=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  if(withDow)base+=' ('+DOW[d.getDay()]+')';
  if(s===t)return '오늘 · '+base;
  const yd=new Date();yd.setDate(yd.getDate()-1);
  if(s===ds(yd))return '어제 · '+base;
  return base;}
function addDays(s,n){const d=pd(s);d.setDate(d.getDate()+n);return ds(d);}
function dayNo(date){ // 챌린지 몇 일차인지 (1-based). 범위 밖이면 0
  if(!S.startDate)return 0;
  const diff=Math.round((pd(date)-pd(S.startDate))/86400000);
  return diff>=0&&diff<CHALLENGE_DAYS?diff+1:0;
}

/* ================================================================
   USER TEST LOGGING — identity / session / durable outbox
================================================================ */
function loadParticipant(){
  try{
    const p=JSON.parse(localStorage.getItem(PARTICIPANT_KEY));
    if(p&&p.anonymousId)return Object.assign({schemaVersion:1,participantId:null,nickname:'',registeredAt:null,budgetCreatedAt:null},p);
  }catch(e){}
  return{schemaVersion:1,participantId:null,anonymousId:randomId(),nickname:'',registeredAt:null,budgetCreatedAt:null};
}
let PARTICIPANT=loadParticipant();
function saveParticipant(){
  try{localStorage.setItem(PARTICIPANT_KEY,JSON.stringify(PARTICIPANT));}catch(e){}
}
saveParticipant();

function loadEventOutbox(){
  try{
    const q=JSON.parse(localStorage.getItem(EVENT_OUTBOX_KEY));
    if(Array.isArray(q))return q.filter(e=>e&&e.eventId&&Date.now()-Date.parse(e.occurredAt)<EVENT_MAX_AGE_MS).slice(-EVENT_OUTBOX_MAX);
  }catch(e){}
  return[];
}
let EVENT_OUTBOX=loadEventOutbox();
let eventFlushRunning=false;
function saveEventOutbox(){
  try{localStorage.setItem(EVENT_OUTBOX_KEY,JSON.stringify(EVENT_OUTBOX));}catch(e){}
}
saveEventOutbox();

let SESSION=null;
function loadSession(){
  try{
    const s=JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if(s&&s.id)return s;
  }catch(e){}
  return null;
}
function saveSession(){
  try{sessionStorage.setItem(SESSION_KEY,JSON.stringify(SESSION));}catch(e){}
}
function referrerType(){
  if(!document.referrer)return'direct';
  try{return new URL(document.referrer).origin===location.origin?'same_origin':'external';}
  catch(e){return'unknown';}
}
function currentLogPage(){
  const onb=document.getElementById('onb');
  if(onb&&onb.classList.contains('show'))return'onboarding';
  const shown=document.querySelector('.sheet.show');
  if(shown){
    return({
      'sheet-input':'input','sheet-day':'day_detail','sheet-queue':'pending_days',
      'sheet-budget':'budget','sheet-settings':'settings','sheet-streak':'streak'
    })[shown.id]||'home';
  }
  return CUR==='record'?'record':'home';
}
function startOrResumeSession(trigger){
  const now=Date.now(),logicalDay=today();
  let s=SESSION||loadSession();
  const isNew=!s||!s.lastActiveAt||now-s.lastActiveAt>=SESSION_TIMEOUT_MS||s.logicalDay!==logicalDay;
  if(isNew)s={id:randomId(),lastActiveAt:now,logicalDay,pageViewed:false};
  else s.lastActiveAt=now;
  SESSION=s;saveSession();
  if(!SESSION.pageViewed){
    SESSION.pageViewed=true;saveSession();
    trackEvent('page_viewed',{trigger,referrerType:referrerType()});
  }
  return isNew;
}
let lastSessionTouch=0;
function noteSessionActivity(trigger){
  const now=Date.now();
  startOrResumeSession(trigger);
  if(now-lastSessionTouch>10000){SESSION.lastActiveAt=now;saveSession();lastSessionTouch=now;}
}

function trackEvent(eventName,properties={},options={}){
  try{
    const session=SESSION||loadSession();
    const event={
      schemaVersion:LOG_SCHEMA_VERSION,
      eventId:randomId(),
      eventName,
      occurredAt:new Date().toISOString(),
      participantId:PARTICIPANT.participantId||null,
      anonymousId:PARTICIPANT.anonymousId,
      sessionId:session?session.id:null,
      challengeId:Object.prototype.hasOwnProperty.call(options,'challengeId')?options.challengeId:(S.challengeId||null),
      page:options.page||currentLogPage(),
      appVersion:APP_VERSION,
      properties
    };
    EVENT_OUTBOX.push(event);
    if(EVENT_OUTBOX.length>EVENT_OUTBOX_MAX)EVENT_OUTBOX=EVENT_OUTBOX.slice(-EVENT_OUTBOX_MAX);
    saveEventOutbox();
    flushEventOutbox();
    return event.eventId;
  }catch(e){return null;}
}
async function flushEventOutbox(){
  if(eventFlushRunning||!LOG_ENDPOINT||!EVENT_OUTBOX.length||navigator.onLine===false)return;
  eventFlushRunning=true;
  try{
    while(EVENT_OUTBOX.length){
      const event=EVENT_OUTBOX[0];
      await postLogEvent(event);
      if(EVENT_OUTBOX[0]&&EVENT_OUTBOX[0].eventId===event.eventId)EVENT_OUTBOX.shift();
      else EVENT_OUTBOX=EVENT_OUTBOX.filter(e=>e.eventId!==event.eventId);
      saveEventOutbox();
    }
  }catch(e){}finally{eventFlushRunning=false;}
}
async function postLogEvent(event){
  const init={method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(event),keepalive:true};
  try{
    const res=await fetch(LOG_ENDPOINT,init);
    if(!res.ok)throw new Error('log_http_'+res.status);
    let body=null;
    try{body=await res.json();}catch(e){}
    if(body&&body.ok===false)return false;
    return true;
  }catch(error){
    const code=String(error&&error.message||'');

function manwon(n){

function amountRange(n){
  n=Math.max(0,Number(n)||0);

function pick(arr,seed){ // seed로 안정적으로 하나 고른다 (재렌더 시 깜빡임 방지)
  let h=0;for(const ch of String(seed))h=(h*31+ch.charCodeAt(0))>>>0;

}

/* ================================================================
   CALC ENGINE — 5일 예산을 남은 날 수로 나눠 '오늘의 안전 페이스' 결정
================================================================ */
function calc(){
  const t=today();
  const res={days:[],byDate:{},streak:0,successTotal:0,queue:[],
    todayPace:0,todaySpent:0,todayInc:0,todayNet:0,
    budget:S.budget5,remaining:S.budget5,windowSpent:0,dayIndex:0,daysLeft:CHALLENGE_DAYS,done:false,started:false};
  if(!S.startDate)return res;
  res.started=true;
  const expByDate={};
  S.exp.forEach(e=>{(expByDate[e.d]=expByDate[e.d]||[]).push(e);});
  const windowEnd=addDays(S.startDate,CHALLENGE_DAYS-1);
  res.windowEnd=windowEnd;
  res.done=t>windowEnd;
  let remaining=S.budget5;
  for(let i=0;i<CHALLENGE_DAYS;i++){
    const date=addDays(S.startDate,i);
    if(date>t)break; // 아직 오지 않은 날
    const daysLeft=CHALLENGE_DAYS-i;
    const pace=remaining>0?remaining/daysLeft:0;
    const exps=expByDate[date]||[];
    // e.nb === true → '예산에서 제외 (기록만)'. 페이스·남은 돈에 반영하지 않는다.
    const spent=exps.filter(e=>e.kind!=='inc'&&!e.nb).reduce((a,e)=>a+e.amt,0);
    const inc=exps.filter(e=>e.kind==='inc'&&!e.nb).reduce((a,e)=>a+e.amt,0);
    const net=spent-inc;
    const settled=!!S.conf[date];
    let success=null,saved=0;
    if(settled){
      if(net<=pace+0.5){success=true;saved=Math.max(0,Math.round(pace-net));}
      else success=false;
    }
    const rec={date,day:i+1,pace,spent,inc,net,exps,settled,success,saved,isToday:date===t};
    res.days.push(rec);res.byDate[date]=rec;
    res.windowSpent+=spent;
    remaining-=net;
    if(date===t){res.todayPace=pace;res.todaySpent=spent;res.todayInc=inc;res.todayNet=net;res.dayIndex=i;res.daysLeft=daysLeft;}
  }
  res.remaining=remaining;
  // 스트릭 = 시작일부터 '연속 마감'. 지난 날을 마감 안 하면 그 지점에서 끊긴다(닫으면 다시 이어짐).
  let streak=0;
  res.days.forEach(r=>{
    if(r.settled){streak++;if(r.success===true)res.successTotal++;}
    else if(r.date<t)streak=0;
  });
  res.streak=streak;
  // 확인 안 한 날 = 지난 날인데 아직 마감 안 함
  res.days.forEach(r=>{if(!r.settled&&r.date<t)res.queue.push(r);});
  return res;
}

}
// 5일 진행 점 (day1..day5)
function dotRow(t){
  let h='';
  for(let i=0;i<CHALLENGE_DAYS;i++){
    const dt=addDays(S.startDate,i);
    const rr=C.byDate[dt];
    let cls='';
    if(rr&&rr.settled)cls=rr.success===true?'ok':'over';
    else if(dt<t)cls='pend';
    if(dt===t)cls+=' today';
    h+=`<div class="sdot ${cls}">${rr&&rr.settled?(rr.success===true?'✓':'!'):''}</div>`;
  }
  return h;
}

// 마감/취소 버튼 롱프레스 (1.5초 꾹 눌러야 실행 — 오터치 방지)
const HOLD_MS=1200;
function longPress(btn,action){
  if(!btn)return;
  let timer=null;
  const start=e=>{
    e.preventDefault();
    btn.classList.add('holding');
    timer=setTimeout(()=>{timer=null;btn.classList.remove('holding');action();},HOLD_MS);
  };
  const cancel=()=>{if(timer){clearTimeout(timer);timer=null;}btn.classList.remove('holding');};
  btn.addEventListener('pointerdown',start);
  btn.addEventListener('pointerup',cancel);
  btn.addEventListener('pointercancel',cancel);
  btn.addEventListener('pointerleave',cancel);
  btn.addEventListener('contextmenu',e=>e.preventDefault());
}
function bindHold(){
  const tgt=holdTarget||today();
  longPress(document.getElementById('close-hold'),()=>confirmDay(tgt));
  longPress(document.getElementById('close-cancel'),()=>{if(canCancel(tgt))cancelClose(tgt);});
}
function canCancel(date){return date===today();}
function cancelClose(date){
  const entryPoint=currentLogPage();
  const wasSettled=!!S.conf[date];
  delete S.conf[date];
  save();
  if(wasSettled&&!tutActive){
    trackEvent('challenge_day_reopened',{
      challengeDay:dayNo(date)||null,transactionDate:date,entryPoint
    });
  }
  render();
  toast('마감을 취소했어요');
}

// ---------- RECORD ----------
function renderRecord(){
  const el=document.getElementById('record-body');
  const t=today();
  if(!calMonth)calMonth=t.slice(0,7);
  const[cy,cm]=calMonth.split('-').map(Number);
  const total=dim(cy,cm),first=new Date(cy,cm-1,1).getDay();

  const ra=document.getElementById('record-actions');
  if(ra)ra.innerHTML=`
    ${C.queue.length?`<button class="chip-btn solid" style="flex:none;padding:8px 14px;font-size:13px" onclick="openQueue()">📥 확인 ${C.queue.length}</button>`:''}`;

  function dayCell(dn){
    const date=cy+'-'+String(cm).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
    const r=C.byDate[date];
    const inWindow=dayNo(date)>0;
    let st='none',dimmed='';
    if(date>t||!inWindow)dimmed='dim';
    if(r){
      if(r.settled)st=r.success===true?'ok':'over';
      else if(date<t)st='pend';
    }
    return `<button class="cal-day ${dimmed} ${date===t?'today':''}" onclick="openDay('${date}')">
      <span class="dn">${dn}${st!=='none'?`<i class="st ${st}"></i>`:''}</span></button>`;
  }
  const weeks=[];let wk=Array(first).fill(0);
  for(let dn=1;dn<=total;dn++){wk.push(dn);if(wk.length===7){weeks.push(wk);wk=[];}}
  if(wk.length){while(wk.length<7)wk.push(0);weeks.push(wk);}
  let grid='<div class="caldrow">'+DOW.map(w=>`<div class="cal-dow">${w}</div>`).join('')+'</div>';
  weeks.forEach(w=>{
    grid+='<div class="caldrow">'+w.map(dn=>dn?dayCell(dn):'<div></div>').join('')+'</div>';
  });

  // 이 달의 기록 (변동 지출/수입만)
  const monthDays=C.days.filter(r=>r.date.slice(0,7)===calMonth&&(r.exps.length||r.settled)).reverse();
  const listHtml=monthDays.length?monthDays.map(r=>{
    const tag=r.settled?(r.success===true?'<span class="tag ok">성공 ✓</span>':'<span class="tag over">초과·기록됨</span>')
      :(r.date<t?'<span class="tag pend">확인 대기</span>':'');
    return `<div class="day-group">
      <div class="day-head"><span class="d">${fmtDate(r.date,true)}</span>${tag}
        <span class="sum num">${r.inc?`<b style="color:var(--green)">+${won(r.inc)}</b> · `:''}${r.spent?won(r.spent):'지출 없음'}</span></div>
      ${r.exps.map(e=>`
        <div class="exp-row">
          <div class="exp-ic">${e.kind==='inc'?'💰':'💸'}</div>
          <div><div class="exp-name">${esc(e.name)||(e.kind==='inc'?'수입':'지출')}${e.nb?' <span style="font-size:10px;font-weight:800;color:var(--p-deep);background:var(--p-soft);border-radius:5px;padding:1px 5px;vertical-align:1px">기록만</span>':''}</div>
          <div class="exp-src">${e.time?e.time+' · ':''}${e.nb?'예산 제외':(e.kind==='inc'?'수입':'지출')}${e.src==='ocr'?' · 📷 캡처':e.src==='paste'?' · 📋 붙여넣기':''}</div></div>
          <div class="exp-amt num" ${e.kind==='inc'?'style="color:var(--green)"':''} ${e.nb?'style="color:var(--faint)"':''}>${e.kind==='inc'?'+':''}${won(e.amt)}</div>
          <button class="exp-del" onclick="openEditExp('${e.id}')">✎</button>
        </div>`).join('')}
    </div>`;
  }).join(''):`<div class="empty"><div class="e-ic">🧾</div><div class="e-t">이 달의 기록이 아직 없어요</div>
    <div class="e-s">＋ 버튼으로 기록해 보세요</div></div>`;

  let mSpent=0,mInc=0;
  S.exp.forEach(e=>{if(e.d.slice(0,7)===calMonth&&!e.nb){if(e.kind==='inc')mInc+=e.amt;else mSpent+=e.amt;}});

  // 남은 예산 히어로 (홈에서 이동해 옴)
  const budgetPct=S.budget5>0?Math.max(0,Math.min(100,C.remaining/S.budget5*100)):0;
  const heroHtml=`
  <div class="hero" style="margin-top:8px">
    <button class="hero-edit" onclick="openBudgetSheet()">✎ 예산</button>
    <div class="cap">5일치 가용 예산 · 남은 돈</div>
    <div class="big num">${won(C.started?C.remaining:S.budget5)}</div>
    <div class="bar"><i style="width:${budgetPct}%"></i></div>
    <div class="barrow"><span>Day ${C.dayIndex+1} / ${CHALLENGE_DAYS}</span><span>${Math.round(budgetPct)}% 남음</span></div>
  </div>`;

  el.innerHTML=`
  ${heroHtml}
  <div class="duo" style="margin-top:0">
    <div class="card" style="margin:0">
      <div class="mini-cap">${cm}월 지출</div>
      <div class="mini-num num">${won(mSpent)}</div>
    </div>
    <div class="card" style="margin:0">
      <div class="mini-cap">${cm}월 수입</div>
      <div class="mini-num num" style="color:var(--green)">+${won(mInc)}</div>
    </div>
  </div>
  <div class="cal">
    <div class="cal-head">
      <div class="cal-title">${cy}년 ${cm}월</div>
      <div class="cal-nav">
        <button onclick="moveCal(-1)">‹</button><button onclick="moveCal(1)">›</button>
      </div>
    </div>
    ${grid}
    <div class="legend">
      <span><i class="st ok"></i>페이스 성공</span><span><i class="st over"></i>초과·마감</span>
      <span><i class="st pend"></i>확인 대기</span>
    </div>
  </div>
  <div class="section-label">지출 내역</div>
  ${listHtml}<div style="height:8px"></div>`;
}
function moveCal(n){
  let[y,m]=calMonth.split('-').map(Number);m+=n;
  if(m<1){m=12;y--;}if(m>12){m=1;y++;}
  calMonth=y+'-'+String(m).padStart(2,'0');renderRecord();
}

// ---------- confirm ----------
function confirmDay(date){
  const practice=tutActive;
  const entryPoint=currentLogPage();
  if(tutActive&&tutStep==='close'){tutStep='celebrating';tutHideCoach();}
  S.conf[date]=1;save();
  C=calc();
  const r=C.byDate[date];
  if(!practice&&r){
    trackEvent('challenge_day_completed',{
      challengeDay:r.day,transactionDate:date,result:r.success===true?'success':'over',
      transactionCount:r.exps.length,entryPoint
    });
  }
  closeSheets(); // 시트 닫아 홈(마감 버튼·스트릭)이 보이게
  // 시각적 보상: 마감 버튼에서 스트릭 카드로 불꽃이 날아가는 모션 → 끝나면 축하 모달
  flyFlameToStreak(()=>{
    if(r&&r.success===true){celebrate(r,C);}
    else if(r&&r.success===false){celebrateOver(date,r);}
    render();
  });
}
// 마감 버튼 → 스트릭 카드로 🔥가 이동하는 모션 (시각적 보상)
function flyFlameToStreak(cb){
  const src=document.getElementById('close-hold')||document.getElementById('close-cancel');
  const tgt=document.querySelector('#home-streak .flame-big');
  if(CUR!=='home'||!src||!tgt){cb();return;}
  const s=src.getBoundingClientRect(), e=tgt.getBoundingClientRect();
  const sx=s.left+s.width/2, sy=s.top+s.height/2;
  const ex=e.left+e.width/2, ey=e.top+e.height/2;
  const fly=document.createElement('div');
  fly.textContent='🔥';
  fly.style.cssText=`position:fixed;left:${sx-18}px;top:${sy-18}px;font-size:36px;line-height:1;z-index:250;pointer-events:none;
    filter:drop-shadow(0 4px 10px rgba(232,87,31,.5));transition:transform .68s cubic-bezier(.5,-0.3,.25,1),opacity .68s ease-in;will-change:transform,opacity`;
  document.body.appendChild(fly);
  // 살짝 튀어오른 뒤 스트릭으로 빨려들어감
  requestAnimationFrame(()=>{
    fly.style.transform=`translate(${ex-sx}px,${ey-sy}px) scale(.5) rotate(20deg)`;
    fly.style.opacity='0.2';
  });
  setTimeout(()=>{
    if(tgt.animate)tgt.animate([{transform:'scale(1)'},{transform:'scale(1.55)'},{transform:'scale(1)'}],{duration:420,easing:'cubic-bezier(.3,1.6,.4,1)'});
    fly.remove();
    cb();
  },700);
}

// ---------- celebration ----------
function celebrate(r,c){
  const el=document.getElementById('celebrate');
  const milestones=[3,5,7,10];
  const hitMilestone=milestones.includes(c.streak)&&!S.seenMilestones.includes(c.streak);
  if(hitMilestone){S.seenMilestones.push(c.streak);save();}
  el.innerHTML=`<div class="cel-card">
    ${confettiHtml(hitMilestone?46:18)}
    <div class="cel-emoji">${hitMilestone?'🏆':'🎉'}</div>
    <div class="cel-title">${hitMilestone?c.streak+'일 연속 달성!':'하루 마감 성공!'}</div>
    ${r.saved>0?`<div class="cel-amt num" id="cel-count">+0원</div>
    <div class="cel-sub">오늘 안전 페이스보다<br>이만큼 덜 썼어요</div>`:`<div class="cel-sub">${praiseRandom()}</div>`}
    <div class="cel-streak">🔥 기록 스트릭 ${c.streak}일째</div>
    <button class="cel-btn" onclick="closeCelebrate()">좋았어</button>
  </div>`;
  el.classList.add('show');
  if(r.saved>0)countUp('cel-count',r.saved);
  const card=el.querySelector('.cel-card');
  for(let i=0;i<6;i++){
    const coin=document.createElement('div');coin.className='coin';coin.textContent='🪙';
    coin.style.left=(10+Math.random()*80)+'%';coin.style.top='-10px';
    coin.style.animationDelay=(i*0.12)+'s';card.appendChild(coin);
  }
}
// 초과일 마감: 스트릭은 이어짐. 훈계 문구를 준다.
function celebrateOver(date,r){
  const el=document.getElementById('celebrate');
  const c=calc();
  const over=Math.max(0,Math.round(r.net-r.pace));
  el.innerHTML=`<div class="cel-card">
    <div class="cel-emoji">🔥</div>
    <div class="cel-title">기록 완료 · 스트릭 이어짐</div>
    <div class="cel-sub">${pick(SCOLD,date)}<br>페이스보다 <b class="num">${won(over)}</b> 더 썼어요.</div>

    <button class="cel-btn" style="margin-top:16px" onclick="closeCelebrate()">알겠어요</button>
  </div>`;

}
function confettiHtml(n){
  const colors=['#0E7B54','#D99A22','#E8571F','#2C6E9E','#8FE3BF','#FFD98A'];
  let h='';
  for(let i=0;i<n;i++){
    h+=`<div class="confetti" style="left:${Math.random()*100}%;background:${colors[i%colors.length]};
      animation:confall ${1.4+Math.random()}s ${Math.random()*.5}s ease-in forwards;border-radius:${Math.random()>.5?'50%':'2px'}"></div>`;
  }
  return h;
}
function closeCelebrate(){
  document.getElementById('celebrate').classList.remove('show');render();
  if(tutActive&&tutStep==='celebrating'){ // 마감 체험 끝 → 튜토리얼 완료 화면
    tutStep='done';
    onbScreen='finish';
    document.getElementById('onb').classList.add('show');
    renderOnb();
  }
}
function countUp(id,target){
  const el=document.getElementById(id);if(!el)return;
  const dur=900,t0=performance.now();
  function tick(t){
    const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);
    el.textContent='+'+won(target*e);
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400);
}

function saveExp(src){
  const amt=num(document.getElementById('in-amt').value);
  const name=document.getElementById('in-name').value.trim();
  const kind=document.querySelector('#in-kind button.on')?.dataset.k||'exp';

      if(before.d!==d)changedFields.push('transactionDate');
      if(before.time!==time)changedFields.push('time');

      if(before.nb!==nb)changedFields.push('budgetExcluded');

      if(!tutActive){

// --- 붙여넣기 파서 ---
function parsePayText(txt){
  const cand={amt:'',name:'',date:null,raw:txt,src:'paste'};
  const wonMatches=[...txt.matchAll(/([0-9][0-9,]*[0-9]|[0-9])\s*원/g)].map(m=>num(m[1]));
  const numMatches=[...txt.matchAll(/(?<![\d,.])([1-9][0-9,]{2,})(?![\d%])/g)].map(m=>num(m[1]));
  const amts=(wonMatches.length?wonMatches:numMatches).filter(n=>n>=100&&n<10000000);
  if(amts.length)cand.amt=amts[0];
  const dm=txt.match(/(\d{1,2})[\/.월]\s?(\d{1,2})일?/);
  if(dm){
    const y=new Date().getFullYear();
    const cd=new Date(y,+dm[1]-1,+dm[2]);
    if(cd<=new Date())cand.date=ds(cd);
  }
  const stop=/승인|일시불|할부|누적|잔액|체크|신용|카드|입금|출금|사용|원|KB|신한|삼성|현대|롯데|하나|우리|국민|농협|토스|카카오|페이|[0-9]{2}[:\/.][0-9]{2}|\*/;
  const lines=txt.split(/\n/).map(s=>s.trim()).filter(Boolean);
  const nameLine=lines.find(l=>!stop.test(l)&&/[가-힣A-Za-z]{2,}/.test(l)&&l.length<=25);
  if(nameLine)cand.name=nameLine.replace(/[0-9,원]+$/,'').trim();
  const tmm=txt.match(/(?:^|[^\d])([01]?\d|2[0-3]):([0-5]\d)(?!\d)/);
  if(tmm)cand.time=String(tmm[1]).padStart(2,'0')+':'+tmm[2];
  return cand;
}
function lineName(l){
  return l.replace(/\d{1,2}[\/.월]\s?\d{1,2}일?/g,'')
    .replace(/([01]?\d|2[0-3]):[0-5]\d/g,'')
    .replace(/[0-9][0-9,]*\s*원?/g,'')
    .replace(/승인|일시불|할부|누적|잔액|체크|신용|카드|입금|출금|사용|KB|신한|삼성|현대|롯데|하나|우리|국민|농협|토스|카카오|페이/g,'')
    .replace(/[*·|()\/:\-]/g,' ').replace(/\s+/g,' ').trim();
}
function parsePayTexts(txt){
  const lines=txt.split(/\n/).map(s=>s.trim()).filter(Boolean);
  const hasAmt=l=>/([0-9][0-9,]{2,})\s*원|(?<![\d,.])[1-9][0-9,]{2,}(?![\d%])/.test(l);
  const txLines=lines.filter(l=>hasAmt(l)&&!/누적|잔액|합계|총|한도/.test(l));
  if(txLines.length>=2){
    const cands=txLines.map(l=>{
      const c=parsePayText(l);
      if(!c.name)c.name=lineName(l);
      c.raw=l;
      return c;
    }).filter(c=>c.amt);
    if(cands.length>=2)return cands;
  }
  return[parsePayText(txt)];
}
function runPaste(){
  const txt=document.getElementById('paste-text').value.trim();
  if(!txt){toast('내용을 붙여넣어 주세요');return;}
  const cands=parsePayTexts(txt);cands.forEach(c=>c.src='paste');
  if(cands.length>1)renderCandPicker(cands);
  else{candQueue=cands;candIdx=0;showCand();}
}

// --- OCR (Tesseract.js lazy load) ---
let ocrWorker=null;
async function ensureOCR(){
  if(ocrWorker)return ocrWorker;
  if(!window.Tesseract){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
      s.onload=res;s.onerror=()=>rej(new Error('네트워크에서 OCR 엔진을 못 불러왔어요'));
      document.head.appendChild(s);
    });
  }
  ocrWorker=await Tesseract.createWorker(['kor','eng']);
  return ocrWorker;
}
async function runOCR(file){
  if(!file)return;
  const p=document.getElementById('input-panel');
  p.innerHTML=`<div class="ocr-status"><div class="spinner"></div>
    <div style="font-size:14.5px;font-weight:800">캡처를 읽는 중…</div>
    <div class="hint" style="text-align:center" id="ocr-prog">처음 한 번은 한국어 인식 모델을 내려받아 조금 걸려요</div></div>`;
  try{
    const worker=await ensureOCR();
    const url=URL.createObjectURL(file);
    const{data}=await worker.recognize(url);
    URL.revokeObjectURL(url);
    const txt=(data.text||'').trim();
    if(!txt)throw new Error('글자를 못 읽었어요');
    const cands=parsePayTexts(txt);cands.forEach(c=>c.src='ocr');
    if(cands.length>1)renderCandPicker(cands);
    else{candQueue=cands;candIdx=0;showCand();}
  }catch(e){
    p.innerHTML=`<div class="empty" style="padding:26px 10px"><div class="e-ic">😵</div>
      <div class="e-t">캡처를 읽지 못했어요</div>
      <div class="e-s">${esc(e.message||'')}<br>붙여넣기나 직접 입력으로 해주세요</div>
      <button class="chip-btn ghost" style="margin-top:14px;padding:12px 22px;display:inline-block;flex:none" onclick="renderInputPanel()">✏️ 직접 입력</button></div>`;
  }
}

// --- 스트릭 캘린더 ---
let stMonth=null;
function openStreak(){
  stMonth=today().slice(0,7);
  renderStreak();
  showSheet('sheet-streak');
}
function moveStreak(n){
  let[y,m]=stMonth.split('-').map(Number);m+=n;
  if(m<1){m=12;y--;}if(m>12){m=1;y++;}
  stMonth=y+'-'+String(m).padStart(2,'0');renderStreak();
}
function renderStreak(){
  const[cy,cm]=stMonth.split('-').map(Number);
  const t=today();
  let run=0,best=0;
  C.days.forEach(r=>{
    if(r.settled){run++;best=Math.max(best,run);}
    else if(r.date<t)run=0;
  });
  const total=dim(cy,cm),first=new Date(cy,cm-1,1).getDay();
  let cells='';
  for(let i=0;i<first;i++)cells+='<div></div>';
  for(let dn=1;dn<=total;dn++){
    const date=cy+'-'+String(cm).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
    const r=C.byDate[date];
    let cls='';
    if(!r||date>t||dayNo(date)===0)cls='dim';
    else if(r.settled)cls=r.success===true?'ok':'over';
    else if(date<t)cls='pend';
    cells+=`<div class="st-day ${cls} ${date===t?'today':''}">${dn}</div>`;
  }
  document.getElementById('streak-body').innerHTML=`
    <div class="st-hero">
      <div class="fl">🔥</div>
      <div class="n num">${C.streak}일 연속</div>
      <div class="b num">최장 ${best}일 · 페이스 지킨 날 ${C.successTotal}일</div>
    </div>
    <div class="hint" style="text-align:center;margin:-6px 0 14px;line-height:1.6">스트릭은 <b>절약이 아니라 마감</b>에 걸려 있어요.<br>초과한 날도 <b>마감하면 이어져요</b> — 매일 나타나 기록하는 게 핵심이에요.</div>
    <div class="cal-head" style="margin-bottom:10px">
      <div class="cal-title">${cy}년 ${cm}월</div>
      <div class="cal-nav"><button onclick="moveStreak(-1)">‹</button><button onclick="moveStreak(1)">›</button></div>
    </div>
    <div class="caldrow">${DOW.map(w=>`<div class="cal-dow">${w}</div>`).join('')}</div>
    <div class="caldrow" style="gap:5px;margin-top:3px">${cells}</div>
    <div class="legend" style="margin-top:14px">
      <span><i class="st ok"></i>페이스 성공</span>
      <span><i class="st over"></i>초과·마감</span><span><i class="st pend"></i>확인 대기</span>
    </div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='savepoint-v6-backup-'+today()+'.json';
  a.click();URL.revokeObjectURL(a.href);
  toast('백업 파일을 내려받았어요');
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.v!==1)throw new Error();
      const imported=Object.assign({},DEFAULT,d);
      if(!Array.isArray(imported.exp)||!imported.conf||typeof imported.conf!=='object')throw new Error();
      if(!Array.isArray(imported.seenMilestones))imported.seenMilestones=[];
      S=imported;
      if(PARTICIPANT.nickname)S.nickname=PARTICIPANT.nickname;
      if(S.onboarded&&S.startDate&&!S.challengeId)S.challengeId=randomId();
      save();
      trackEvent('data_imported',{hadChallenge:!!S.challengeId,transactionCount:Array.isArray(S.exp)?S.exp.length:0});
      closeSheets();render();
      toast('데이터를 복원했어요');
    }catch(e){toast('올바른 백업 파일이 아니에요');}
  };
  r.readAsText(file);
}
function resetAll(){
  if(!confirm('정말 모든 데이터를 지울까요? 되돌릴 수 없어요.'))return;
  const stats=challengeStats(C);
  trackEvent('app_data_reset',{
    hadActiveChallenge:!!S.challengeId,completedDays:stats.completedDays,transactionCount:S.exp.length
  },{challengeId:S.challengeId||null,page:'settings'});
  localStorage.removeItem(KEY);
  S=JSON.parse(JSON.stringify(DEFAULT));
  S.nickname=PARTICIPANT.nickname||'';
  closeSheets();location.reload();
}

let _coachSel=null,_coachCfg=null;
function placeCoach(sel,cfg){
  _coachSel=sel;_coachCfg=cfg;
  const coach=document.getElementById('coach');
  const hole=document.getElementById('coach-hole');
  const tip=document.getElementById('coach-tip');
  coach.classList.add('show');
  tip.innerHTML=`<div class="ct-title">${cfg.title}</div><div class="ct-body">${cfg.body}</div>
    <div class="ct-actions">${cfg.skip?`<button class="ct-skip" onclick="skipTutorial()">건너뛰기</button>`:''}${cfg.next?`<button class="ct-btn" onclick="tutNext()">${cfg.next}</button>`:''}</div>`;
  positionCoach();
  // 시트 슬라이드업 등 레이아웃이 안정된 뒤 한 번 더 정렬 (스포트라이트가 대상에 정확히 맞게)
  setTimeout(()=>{ if(tutActive)positionCoach(); },330);
}
function positionCoach(){
  if(!_coachCfg)return;
  const cfg=_coachCfg;
  const hole=document.getElementById('coach-hole');
  const tip=document.getElementById('coach-tip');
  const blk={t:document.getElementById('cblk-t'),b:document.getElementById('cblk-b'),
             l:document.getElementById('cblk-l'),r:document.getElementById('cblk-r')};
  const tgt=_coachSel?document.querySelector(_coachSel):null;
  const vw=window.innerWidth, vh=window.innerHeight, M=12;
  const dark=cfg.dark!==false;
  const setBlk=(el,x,y,w,h)=>{el.style.display='block';el.style.left=x+'px';el.style.top=y+'px';el.style.width=Math.max(0,w)+'px';el.style.height=Math.max(0,h)+'px';};
  const hideBlk=()=>Object.values(blk).forEach(e=>e.style.display='none');
  const RING='inset 0 0 0 3px rgba(255,140,66,.95)';
  const DIM='0 0 0 9999px rgba(16,22,18,.72)';
  if(tgt){
    const r=tgt.getBoundingClientRect(), pad=cfg.pad??6;
    const hx=r.left-pad, hy=r.top-pad, hw=r.width+pad*2, hh=r.height+pad*2;
    hole.style.display='block';
    hole.style.left=hx+'px';hole.style.top=hy+'px';hole.style.width=hw+'px';hole.style.height=hh+'px';
    hole.style.borderRadius=(typeof cfg.round==='string'?cfg.round:(cfg.round??16)+'px');
    // 둥근 링 + (dark면) 둥근 어둠을 box-shadow로 한 번에 → 모서리 깔끔
    hole.style.boxShadow=dark?(RING+','+DIM):RING;
    if(dark){ // 투명 패널로 클릭만 차단
      Object.values(blk).forEach(e=>e.style.background='transparent');
      setBlk(blk.t,0,0,vw,hy);
      setBlk(blk.b,0,hy+hh,vw,vh-(hy+hh));
      setBlk(blk.l,0,hy,hx,hh);
      setBlk(blk.r,hx+hw,hy,vw-(hx+hw),hh);
    }else hideBlk();
  }else{
    hole.style.display='none';
    if(dark){ blk.t.style.background='rgba(16,22,18,'+(cfg.dimOpacity??0.72)+')'; setBlk(blk.t,0,0,vw,vh); blk.b.style.display=blk.l.style.display=blk.r.style.display='none'; } // 전체 덮기+차단 (옅게 가능)
    else hideBlk();
  }
  // 툴팁: 화면 안에서 동적으로 배치 (버튼/시트를 가리지 않게)
  requestAnimationFrame(()=>{
    const th=tip.offsetHeight, tw=tip.offsetWidth;
    const app=document.getElementById('app').getBoundingClientRect();
    let top,left=app.left+app.width/2-tw/2;
    if(cfg.placement==='top'){
      top=app.top+16;
    }else if(cfg.placement==='bottom'){
      top=vh-th-M-84;                 // 하단(내비 위) — 위쪽 달력/기록이 보이게
    }else if(cfg.placement==='center'||!tgt){
      top=Math.max(M,vh/2-th/2);
    }else{
      const r=tgt.getBoundingClientRect(), cy=r.top+r.height/2;
      let above=(cfg.placement==='above')||(cfg.placement==null&&cy>vh/2);
      top=above?(r.top-th-16):(r.bottom+16);
      if(above&&top<M)top=r.bottom+16;                 // 위 공간 부족 → 아래로
      if(!above&&top+th>vh-M)top=r.top-th-16;           // 아래 공간 부족 → 위로
      top=Math.min(Math.max(M,top),vh-th-M);
      left=r.left+r.width/2-tw/2;
    }
    left=Math.min(Math.max(M,left),vw-tw-M);
    tip.style.top=top+'px'; tip.style.left=left+'px';
  });
}

  endTutorial('skipped');
}
// 튜토리얼 종료 → 연습 기록 초기화하고 진짜 챌린지 시작
function endTutorial(outcome='completed'){
  if(outcome==='completed')trackEvent('tutorial_completed',{stepCount:5},{challengeId:null});
  tutActive=false;tutStep='';
  tutHideCoach();
  document.getElementById('onb').classList.remove('show');
  S.exp=[]; S.conf={}; S.seenMilestones=[]; S.startDate=today(); S.onboarded=true;
  issueChallengeId(outcome==='skipped'?'tutorial_skipped':'tutorial_completed');
  homeDate=today(); C=calc(); go('home');
  toast(`${S.nickname?S.nickname+'님, ':''}${outcome==='skipped'?'바로':'튜토리얼 완료!'} 이제 진짜 Day 1이에요 🔥`);
}

/* ================================================================
   BOOT
================================================================ */
let _lastDay=today();
function watchDayRollover(){
  setInterval(()=>{
    if(today()!==_lastDay){_lastDay=today();calMonth=null;homeDate=today();render();}
  },30000);
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&today()!==_lastDay){_lastDay=today();calMonth=null;homeDate=today();render();}
  });
}
function boot(){
  const needsOnboarding=!S.onboarded;
  if(!S.onboarded){
    showOnb();
  }else if(!S.startDate){
    S.startDate=today();save();
  }
  startOrResumeSession('initial_load');
  if(S.onboarded&&S.nickname&&!PARTICIPANT.participantId){
    registerParticipant(sanitizeNickname(S.nickname),'home');
    trackInitialBudget(S.budget5,'home');
  }
  if(PARTICIPANT.nickname&&S.nickname!==PARTICIPANT.nickname){S.nickname=PARTICIPANT.nickname;save();}
  if(S.onboarded&&S.startDate&&!S.challengeId)issueChallengeId('migration');
  if(!needsOnboarding)go('home');
  bindLoggingLifecycle();
  watchDayRollover();
  flushEventOutbox();
}
boot();
</script>
