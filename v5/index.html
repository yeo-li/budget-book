<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>구독정리</title>
<style>
  :root{
    --accent:#ff5b5b;
    --accent-bg:#fff1f1;
    --bg:#f7f7fa;
    --card:#ffffff;
    --text:#1c1c1e;
    --sub:#8a8a8e;
    --line:#ececef;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif; background:var(--bg); color:var(--text);}
  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; padding-bottom:24px;}
  .screen{display:none; padding:24px 20px; animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Onboarding ---------- */
  #screen-onboarding{min-height:100vh; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:40px 28px;}
  .onboard-emoji{font-size:56px; margin-bottom:20px;}
  .onboard-title{font-size:24px; font-weight:800; line-height:1.4; margin:0 0 12px;}
  .onboard-sub{font-size:15px; color:var(--sub); line-height:1.6; margin:0 0 40px;}
  .btn-primary{
    display:block; width:100%; padding:16px; border:none; border-radius:14px;
    background:var(--accent); color:#fff; font-size:16px; font-weight:700; cursor:pointer;
  }
  .btn-primary:active{opacity:.85;}
  .btn-ghost{
    display:block; width:100%; padding:14px; margin-top:12px; border:none; background:none;
    color:var(--sub); font-size:14px; cursor:pointer; text-decoration:underline;
  }

  /* ---------- Connect simulation ---------- */
  #screen-connect{min-height:100vh; display:flex; flex-direction:column;}
  .connect-header{padding:20px 4px; font-size:18px; font-weight:800;}
  .bank-list{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;}
  .bank-item{
    padding:20px 8px; background:var(--card); border-radius:14px; text-align:center;
    font-size:15px; font-weight:600; border:2px solid transparent; cursor:pointer;
  }
  .bank-item:active{border-color:var(--accent);}
  .bank-emoji{font-size:28px; display:block; margin-bottom:8px;}

  .loading-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 30px;}
  .spinner{
    width:44px; height:44px; border-radius:50%; border:4px solid var(--line);
    border-top-color:var(--accent); animation:spin 0.9s linear infinite; margin-bottom:24px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:15px; font-weight:600; color:var(--text); min-height:22px;}
  .loading-progress{width:100%; height:4px; background:var(--line); border-radius:4px; margin-top:24px; overflow:hidden;}
  .loading-progress-bar{height:100%; background:var(--accent); width:0%; transition:width .3s ease;}

  /* ---------- Result ---------- */
  #screen-result{min-height:100vh; display:flex; flex-direction:column; padding-top:60px;}
  .result-headline{font-size:22px; font-weight:800; text-align:center; margin-bottom:6px;}
  .result-sub{font-size:14px; color:var(--sub); text-align:center; margin-bottom:28px;}
  .result-list{flex:1; display:flex; flex-direction:column; gap:10px;}
  .result-item{
    display:flex; align-items:center; gap:12px; background:var(--card); border-radius:14px;
    padding:14px 16px; opacity:0; transform:translateY(10px);
    animation:popIn .4s ease forwards;
  }
  @keyframes popIn{to{opacity:1; transform:translateY(0);}}
  .result-icon{width:40px; height:40px; border-radius:10px; background:var(--accent-bg); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  .result-name{font-size:15px; font-weight:700;}
  .result-amount{font-size:13px; color:var(--sub); margin-top:2px;}
  .result-cta{margin-top:24px;}

  /* ---------- Home ---------- */
  .home-header{display:flex; align-items:center; justify-content:space-between; padding:4px 0 16px;}
  .home-title{font-size:22px; font-weight:800;}
  .home-add{font-size:13px; color:var(--sub); background:none; border:none; cursor:pointer;}

  .summary-card{
    background:linear-gradient(135deg,#1c1c1e,#3a3a3c); color:#fff; border-radius:18px;
    padding:22px 20px; margin-bottom:18px;
  }
  .summary-label{font-size:13px; opacity:.7; margin-bottom:6px;}
  .summary-amount{font-size:28px; font-weight:800;}
  .summary-count{font-size:12px; opacity:.6; margin-top:6px;}

  .banner{
    background:var(--accent-bg); border:1px solid #ffd6d6; border-radius:14px; padding:14px 16px;
    margin-bottom:18px;
  }
  .banner-top{display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--accent); margin-bottom:8px;}
  .banner-text{font-size:13px; color:var(--text); margin-bottom:10px; line-height:1.5;}
  .banner-actions{display:flex; gap:8px;}
  .banner-btn{flex:1; padding:9px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer;}
  .banner-btn.go{background:var(--accent); color:#fff;}
  .banner-feedback{display:flex; gap:8px; margin-top:10px;}
  .fb-btn{flex:1; padding:8px; border-radius:10px; border:1px solid var(--line); background:#fff; font-size:12px; cursor:pointer;}
  .banner-done{font-size:12px; color:var(--sub); margin-top:10px;}

  .sub-list{display:flex; flex-direction:column; gap:10px;}
  .sub-card{background:var(--card); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px;}
  .sub-card.urgent{border:1.5px solid var(--accent);}
  .sub-icon{width:42px; height:42px; border-radius:11px; background:var(--accent-bg); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  .sub-info{flex:1; min-width:0;}
  .sub-name{font-size:15px; font-weight:700;}
  .sub-meta{font-size:12px; color:var(--sub); margin-top:3px;}
  .sub-dday{font-size:12px; font-weight:700; color:var(--sub);}
  .sub-dday.urgent{color:var(--accent);}
  .sub-cancel{
    padding:8px 12px; border-radius:10px; border:none; background:#f0f0f2; color:var(--text);
    font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .sub-cancel:disabled{opacity:.4;}

  .empty{text-align:center; color:var(--sub); font-size:14px; padding:60px 0;}

  .tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
    display:flex; background:#fff; border-top:1px solid var(--line); padding:8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .tab-item{flex:1; text-align:center; background:none; border:none; padding:6px 0; cursor:pointer; color:var(--sub); font-size:11px;}
  .tab-item .tab-emoji{display:block; font-size:20px; margin-bottom:2px;}
  .tab-item.active{color:var(--accent);}

  .footer-link{
    display:block; text-align:center; margin-top:20px; font-size:12px; color:var(--sub);
    text-decoration:underline; background:none; border:none; cursor:pointer; width:100%; padding:10px;
  }

  /* data screen */
  .data-json{
    background:#111; color:#8ce99a; font-size:11px; line-height:1.5; border-radius:12px;
    padding:14px; white-space:pre-wrap; word-break:break-all; max-height:60vh; overflow:auto;
  }
  .danger-btn{
    display:block; width:100%; padding:14px; margin-top:16px; border-radius:12px; border:none;
    background:#fff0f0; color:var(--accent); font-weight:700; font-size:14px; cursor:pointer;
  }

  .add-form{display:flex; flex-direction:column; gap:12px;}
  .add-form input, .add-form select{
    padding:13px 14px; border-radius:12px; border:1px solid var(--line); font-size:15px; background:var(--card); color:var(--text);
  }
  .add-form label{font-size:12px; color:var(--sub); margin-bottom:-6px;}
</style>
</head>
<body>
<div id="app">

  <!-- 화면 1: 온보딩 -->
  <div id="screen-onboarding" class="screen active">
    <div class="onboard-emoji">💳</div>
    <h1 class="onboard-title">카드·계좌를 연동하면<br>구독을 자동으로 찾아드려요</h1>
    <p class="onboard-sub">여기저기 흩어진 구독료, 결제일까지<br>한눈에 정리해드릴게요.</p>
    <button class="btn-primary" onclick="startConnect()">카드·계좌 연동하기</button>
    <button class="btn-ghost" onclick="skipToManual()">직접 추가할게요</button>
  </div>

  <!-- 화면 2: 연동 시뮬레이션 -->
  <div id="screen-connect" class="screen">
    <div id="connect-select">
      <div class="connect-header">연동할 카드·계좌를 선택하세요</div>
      <div class="bank-list" id="bank-list"></div>
    </div>
    <div id="connect-loading" class="loading-wrap" style="display:none;">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">입출금 내역을 불러오는 중…</div>
      <div class="loading-progress"><div class="loading-progress-bar" id="loading-bar"></div></div>
    </div>
  </div>

  <!-- 화면 3: 결과 -->
  <div id="screen-result" class="screen">
    <div class="result-headline">구독 <span id="result-count">0</span>개를 찾았어요!</div>
    <div class="result-sub">자동으로 정리해드렸어요</div>
    <div class="result-list" id="result-list"></div>
    <button class="btn-primary result-cta" id="result-cta" style="visibility:hidden;" onclick="goHome()">내 구독 보기</button>
  </div>

  <!-- 화면 4: 홈 -->
  <div id="screen-home" class="screen">
    <div class="home-header">
      <div class="home-title">내 구독</div>
      <button class="home-add" onclick="showScreen('add')">+ 직접 추가</button>
    </div>

    <div class="summary-card">
      <div class="summary-label">월 예상 구독료</div>
      <div class="summary-amount" id="summary-amount">₩0</div>
      <div class="summary-count" id="summary-count">구독 0개</div>
    </div>

    <div id="banner-slot"></div>

    <div class="sub-list" id="sub-list"></div>
    <div class="empty" id="home-empty" style="display:none;">아직 등록된 구독이 없어요</div>

    <button class="footer-link" onclick="showScreen('data')">내 데이터 보기</button>
  </div>

  <!-- 화면: 직접 추가 -->
  <div id="screen-add" class="screen">
    <div class="connect-header">구독 직접 추가</div>
    <div class="add-form">
      <label>서비스명</label>
      <input type="text" id="add-name" placeholder="예: 넷플릭스">
      <label>금액(원)</label>
      <input type="number" id="add-amount" placeholder="예: 17000">
      <label>결제 주기</label>
      <select id="add-cycle">
        <option value="monthly">매월</option>
        <option value="yearly">매년</option>
      </select>
      <label>다음 결제일</label>
      <input type="date" id="add-date">
      <label>해지 링크(선택)</label>
      <input type="text" id="add-cancel" placeholder="https://...">
      <button class="btn-primary" onclick="submitAdd()">추가하기</button>
    </div>
  </div>

  <!-- 화면: 데이터 보기 -->
  <div id="screen-data" class="screen">
    <div class="connect-header">내 데이터</div>
    <div class="data-json" id="data-json"></div>
    <button class="danger-btn" onclick="resetAllData()">데이터 초기화</button>
  </div>

  <div class="tabbar" id="tabbar" style="display:none;">
    <button class="tab-item active" id="tab-home" onclick="showScreen('home')"><span class="tab-emoji">🏠</span>홈</button>
    <button class="tab-item" id="tab-data" onclick="showScreen('data')"><span class="tab-emoji">📋</span>데이터</button>
  </div>

</div>

<script>
/* ---------------- 시드 데이터 ---------------- */
const BANKS = [
  {name:'국민카드', emoji:'💳'}, {name:'신한카드', emoji:'💳'},
  {name:'토스뱅크', emoji:'🏦'}, {name:'카카오뱅크', emoji:'🏦'},
];

function seedSubs(){
  const today = new Date();
  const d = (n) => {
    const dt = new Date(today); dt.setDate(dt.getDate()+n);
    return dt.toISOString().slice(0,10);
  };
  return [
    { id: 's1', name:'넷플릭스', amount:17000, cycle:'monthly', nextPaymentDate:d(2), cancelUrl:'https://www.netflix.com/CancelPlan' },
    { id: 's2', name:'유튜브 프리미엄', amount:14900, cycle:'monthly', nextPaymentDate:d(5), cancelUrl:'https://www.youtube.com/paid_memberships' },
    { id: 's3', name:'쿠팡와우', amount:7890, cycle:'monthly', nextPaymentDate:d(9), cancelUrl:'https://membership.coupang.com/' },
    { id: 's4', name:'티빙', amount:13900, cycle:'monthly', nextPaymentDate:d(12), cancelUrl:'https://www.tving.com/mypage/payment' },
    { id: 's5', name:'챗지피티', amount:29000, cycle:'monthly', nextPaymentDate:d(15), cancelUrl:'https://chat.openai.com/#settings/Subscription' },
    { id: 's6', name:'스포티파이', amount:11990, cycle:'monthly', nextPaymentDate:d(20), cancelUrl:'https://www.spotify.com/account/subscription/' },
    { id: 's7', name:'밀리의서재', amount:9900, cycle:'monthly', nextPaymentDate:d(24), cancelUrl:'https://www.millie.co.kr/mypage/payment' },
  ];
}

const ICONS = { '넷플릭스':'🎬','유튜브 프리미엄':'▶️','쿠팡와우':'📦','티빙':'📺','챗지피티':'🤖','스포티파이':'🎵','밀리의서재':'📚' };
function iconFor(name){ return ICONS[name] || '💠'; }

/* ---------------- 데이터 유틸 ---------------- */
function getSubs(){ return JSON.parse(localStorage.getItem('subs') || '[]'); }
function setSubs(v){ localStorage.setItem('subs', JSON.stringify(v)); }
function getEvents(){ return JSON.parse(localStorage.getItem('events') || '[]'); }
function logEvent(type, subId){
  const events = getEvents();
  events.push({ type, subId: subId || null, ts: new Date().toISOString() });
  localStorage.setItem('events', JSON.stringify(events));
}
function isOnboarded(){ return localStorage.getItem('onboarded') === 'true'; }
function setOnboarded(){ localStorage.setItem('onboarded', 'true'); }

function rollForward(sub){
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(sub.nextPaymentDate);
  while (next < today){
    if (sub.cycle === 'yearly') next.setFullYear(next.getFullYear()+1);
    else next.setMonth(next.getMonth()+1);
  }
  sub.nextPaymentDate = next.toISOString().slice(0,10);
  return sub;
}

function dDay(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function monthlyAmount(sub){
  return sub.cycle === 'yearly' ? Math.round(sub.amount / 12) : sub.amount;
}

/* ---------------- 화면 전환 ---------------- */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const tabbar = document.getElementById('tabbar');
  if (name === 'home' || name === 'data'){
    tabbar.style.display = 'flex';
    document.getElementById('tab-home').classList.toggle('active', name==='home');
    document.getElementById('tab-data').classList.toggle('active', name==='data');
  } else {
    tabbar.style.display = 'none';
  }
  if (name === 'home') renderHome();
  if (name === 'data') renderData();
  window.scrollTo(0,0);
}

/* ---------------- 온보딩 → 연동 ---------------- */
function startConnect(){
  logEvent('connect_start');
  showScreen('connect');
  const list = document.getElementById('bank-list');
  list.innerHTML = BANKS.map(b => `<div class="bank-item" onclick="pickBank('${b.name}')"><span class="bank-emoji">${b.emoji}</span>${b.name}</div>`).join('');
  document.getElementById('connect-select').style.display = 'block';
  document.getElementById('connect-loading').style.display = 'none';
}

function pickBank(){
  document.getElementById('connect-select').style.display = 'none';
  document.getElementById('connect-loading').style.display = 'flex';
  runLoadingSequence();
}

function runLoadingSequence(){
  const steps = ['입출금 내역을 불러오는 중…', '정기 결제를 분석하는 중…', '완료!'];
  const textEl = document.getElementById('loading-text');
  const barEl = document.getElementById('loading-bar');
  let i = 0;
  textEl.textContent = steps[0];
  barEl.style.width = '10%';
  const interval = setInterval(() => {
    i++;
    if (i < steps.length){
      textEl.textContent = steps[i];
      barEl.style.width = (30 + i*35) + '%';
    }
    if (i >= steps.length){
      clearInterval(interval);
      barEl.style.width = '100%';
      setTimeout(showResult, 400);
    }
  }, 900);
}

function showResult(){
  const subs = seedSubs();
  setSubs(subs);
  setOnboarded();
  logEvent('connect_done');

  showScreen('result');
  document.getElementById('result-count').textContent = subs.length;
  const listEl = document.getElementById('result-list');
  listEl.innerHTML = '';
  const cta = document.getElementById('result-cta');
  cta.style.visibility = 'hidden';

  subs.forEach((sub, idx) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.style.animationDelay = (idx * 0.18) + 's';
    item.innerHTML = `
      <div class="result-icon">${iconFor(sub.name)}</div>
      <div>
        <div class="result-name">${sub.name}</div>
        <div class="result-amount">₩${sub.amount.toLocaleString()} · ${sub.cycle==='monthly'?'매월':'매년'}</div>
      </div>`;
    listEl.appendChild(item);
  });

  setTimeout(() => { cta.style.visibility = 'visible'; }, subs.length * 180 + 300);
}

function skipToManual(){
  setSubs([]);
  setOnboarded();
  showScreen('home');
}

function goHome(){ showScreen('home'); }

/* ---------------- 홈 ---------------- */
function renderHome(){
  logEvent('open');
  localStorage.setItem('lastOpen', new Date().toISOString());

  let subs = getSubs();
  subs = subs.map(rollForward);
  setSubs(subs);
  subs.sort((a,b) => new Date(a.nextPaymentDate) - new Date(b.nextPaymentDate));

  const total = subs.reduce((sum, s) => sum + monthlyAmount(s), 0);
  document.getElementById('summary-amount').textContent = '₩' + total.toLocaleString();
  document.getElementById('summary-count').textContent = `구독 ${subs.length}개`;

  renderBanner(subs);

  const listEl = document.getElementById('sub-list');
  const emptyEl = document.getElementById('home-empty');
  listEl.innerHTML = '';
  if (subs.length === 0){
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    subs.forEach(sub => {
      const dd = dDay(sub.nextPaymentDate);
      const urgent = dd <= 3;
      const card = document.createElement('div');
      card.className = 'sub-card' + (urgent ? ' urgent' : '');
      card.innerHTML = `
        <div class="sub-icon">${iconFor(sub.name)}</div>
        <div class="sub-info">
          <div class="sub-name">${sub.name}</div>
          <div class="sub-meta">₩${sub.amount.toLocaleString()} · ${sub.cycle==='monthly'?'매월':'매년'}</div>
        </div>
        <div>
          <div class="sub-dday${urgent?' urgent':''}">${ddayLabel(dd)}</div>
        </div>
        <button class="sub-cancel" ${sub.cancelUrl ? '' : 'disabled'} onclick="clickCancel('${sub.id}')">해지하러 가기</button>
      `;
      listEl.appendChild(card);
    });
  }
}

function ddayLabel(dd){
  if (dd === 0) return 'D-day';
  if (dd > 0) return 'D-' + dd;
  return '+' + Math.abs(dd);
}

function clickCancel(subId){
  const subs = getSubs();
  const sub = subs.find(s => s.id === subId);
  if (!sub || !sub.cancelUrl) return;
  logEvent('cancel_click', subId);
  window.open(sub.cancelUrl, '_blank');
}

/* ---------------- 결제 임박 배너 ---------------- */
function renderBanner(subs){
  const slot = document.getElementById('banner-slot');
  const urgentSubs = subs.filter(s => dDay(s.nextPaymentDate) <= 3);
  if (urgentSubs.length === 0){ slot.innerHTML = ''; return; }

  const target = urgentSubs[0];
  const dd = dDay(target.nextPaymentDate);
  const bannerKey = 'bannerFeedback_' + target.id + '_' + target.nextPaymentDate;
  const already = localStorage.getItem(bannerKey);

  slot.innerHTML = `
    <div class="banner">
      <div class="banner-top">🔔 결제 임박</div>
      <div class="banner-text"><b>${target.name}</b> 결제 ${ddayLabel(dd)} · ₩${target.amount.toLocaleString()}</div>
      <div class="banner-actions">
        <button class="banner-btn go" onclick="clickCancel('${target.id}')" ${target.cancelUrl?'':'disabled'}>해지하러 가기</button>
      </div>
      ${already
        ? `<div class="banner-done">응답해주셔서 감사해요 🙏</div>`
        : `<div class="banner-text" style="margin-top:10px; margin-bottom:0;">이렇게 미리 알려주면 쓸 것 같아요?</div>
           <div class="banner-feedback">
             <button class="fb-btn" onclick="bannerFeedback('${bannerKey}', true)">예</button>
             <button class="fb-btn" onclick="bannerFeedback('${bannerKey}', false)">아니오</button>
           </div>`
      }
    </div>
  `;
}

function bannerFeedback(key, yes){
  logEvent(yes ? 'helpful_yes' : 'helpful_no');
  localStorage.setItem(key, '1');
  renderHome();
}

/* ---------------- 직접 추가 ---------------- */
function submitAdd(){
  const name = document.getElementById('add-name').value.trim();
  const amount = parseInt(document.getElementById('add-amount').value, 10);
  const cycle = document.getElementById('add-cycle').value;
  const date = document.getElementById('add-date').value;
  const cancelUrl = document.getElementById('add-cancel').value.trim() || null;

  if (!name || !amount || !date){
    alert('서비스명, 금액, 다음 결제일을 입력해주세요.');
    return;
  }

  const subs = getSubs();
  subs.push({
    id: 's' + Date.now(),
    name, amount, cycle,
    nextPaymentDate: date,
    cancelUrl
  });
  setSubs(subs);

  document.getElementById('add-name').value = '';
  document.getElementById('add-amount').value = '';
  document.getElementById('add-date').value = '';
  document.getElementById('add-cancel').value = '';

  showScreen('home');
}

/* ---------------- 데이터 보기 / 초기화 ---------------- */
function renderData(){
  const dump = {
    subs: getSubs(),
    events: getEvents(),
    onboarded: isOnboarded(),
    lastOpen: localStorage.getItem('lastOpen')
  };
  document.getElementById('data-json').textContent = JSON.stringify(dump, null, 2);
}

function resetAllData(){
  if (!confirm('모든 데이터를 초기화할까요?')) return;
  localStorage.removeItem('subs');
  localStorage.removeItem('events');
  localStorage.removeItem('onboarded');
  localStorage.removeItem('lastOpen');
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('bannerFeedback_')) localStorage.removeItem(k);
  });
  showScreen('onboarding');
}

/* ---------------- 초기 진입 ---------------- */
(function init(){
  if (isOnboarded()){
    showScreen('home');
  } else {
    showScreen('onboarding');
  }
})();
</script>
</body>
</html>
