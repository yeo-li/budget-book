<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>구독 결제일 확인</title>
<style>
  :root{
    --bg:#f7f7f8;
    --card:#ffffff;
    --border:#e5e5ea;
    --text:#1c1c1e;
    --sub:#8e8e93;
    --accent:#ff3b30;
    --accent-bg:#fff1f0;
    --primary:#ff7a3d;
    --primary-dark:#e8621f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding-bottom:76px;
  }
  .view.hidden{display:none;}
  .tabbar{
    position:fixed;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:100%;
    max-width:480px;
    display:flex;
    background:#fff;
    border-top:1px solid var(--border);
    z-index:15;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tabbar button{
    flex:1;
    padding:12px 0 10px;
    background:none;
    border:none;
    font-size:12px;
    color:var(--sub);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
  }
  .tabbar button .tab-icon{font-size:18px;}
  .tabbar button.active{color:var(--primary);font-weight:700;}
  .settings-section{
    margin:8px 16px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .settings-btn{
    text-align:left;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    color:var(--text);
  }
  .settings-btn.danger{
    color:var(--accent);
    border-color:#ffd4d1;
  }
  header{
    padding:20px 16px 12px;
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:5;
  }
  header h1{
    font-size:20px;
    margin:0;
    font-weight:700;
  }
  .banner{
    margin:0 16px 12px;
    background:var(--accent-bg);
    border:1px solid #ffd4d1;
    border-radius:14px;
    padding:14px;
  }
  .banner-title{
    font-size:14px;
    font-weight:700;
    color:var(--accent);
    margin-bottom:6px;
  }
  .banner-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .banner-actions{
    display:flex;
    gap:6px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .banner-actions button{
    font-size:12px;
    padding:6px 10px;
    border-radius:8px;
    border:1px solid #ffd4d1;
    background:#fff;
    color:var(--accent);
  }
  .banner-helpful{
    margin-top:8px;
    font-size:12px;
    color:var(--sub);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .banner-helpful button{
    border:1px solid var(--border);
    background:#fff;
    border-radius:8px;
    padding:4px 8px;
    font-size:12px;
  }
  main{padding:0 16px;}
  .list{display:flex;flex-direction:column;gap:10px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
  }
  .card.urgent{
    border-color:#ffb3ab;
    background:linear-gradient(0deg,#fff,#fff),var(--accent-bg);
    box-shadow:0 0 0 1px #ffd4d1 inset;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
  }
  .card-name{font-size:16px;font-weight:700;}
  .card-amount{font-size:14px;color:var(--sub);margin-top:2px;}
  .dday{
    font-size:13px;
    font-weight:700;
    padding:4px 8px;
    border-radius:8px;
    background:#f0f0f2;
    color:var(--text);
    white-space:nowrap;
  }
  .dday.urgent{
    background:var(--accent);
    color:#fff;
  }
  .card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
  }
  .cycle-tag{
    font-size:11px;
    color:var(--sub);
    background:#f0f0f2;
    padding:2px 8px;
    border-radius:6px;
  }
  .cancel-btn{
    font-size:13px;
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
  }
  .cancel-btn.enabled{
    background:var(--text);
    color:#fff;
    border-color:var(--text);
  }
  .cancel-btn:disabled{
    color:#c7c7cc;
    cursor:not-allowed;
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--sub);
  }
  .empty p{margin:8px 0 0;font-size:14px;}
  .total-card{
    margin:0 16px 16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
  }
  .total-label{
    font-size:13px;
    color:var(--sub);
  }
  .total-amount{
    font-size:26px;
    font-weight:800;
    margin-top:4px;
  }
  .total-sub{
    font-size:12px;
    color:var(--sub);
    margin-top:6px;
  }
  .fab{
    position:fixed;
    left:50%;
    bottom:calc(76px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    width:calc(100% - 32px);
    max-width:448px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:15px;
    font-size:16px;
    font-weight:700;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .fab:active{background:var(--primary-dark);}
  .datalink{
    display:block;
    text-align:center;
    color:var(--sub);
    font-size:12px;
    margin:24px 0 90px;
  }
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.4);
    display:flex;
    align-items:flex-end;
    z-index:20;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:#fff;
    width:100%;
    max-width:480px;
    margin:0 auto;
    border-radius:20px 20px 0 0;
    padding:20px 16px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
  }
  .modal h2{margin:0 0 16px;font-size:18px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:13px;
    color:var(--sub);
    margin-bottom:6px;
  }
  .field input[type=text],
  .field input[type=number],
  .field input[type=date],
  .field input[type=url]{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:15px;
    background:#fafafa;
  }
  .toggle{
    display:flex;
    gap:8px;
  }
  .toggle button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fafafa;
    font-size:14px;
  }
  .toggle button.active{
    background:var(--text);
    color:#fff;
    border-color:var(--text);
  }
  .suggest-list{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
    max-height:160px;
    overflow-y:auto;
  }
  .suggest-list button{
    font-size:13px;
    padding:8px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fafafa;
    color:var(--text);
  }
  .suggest-list button.selected{
    background:var(--text);
    color:#fff;
    border-color:var(--text);
  }
  .suggest-empty{
    font-size:12px;
    color:var(--sub);
    padding:8px 2px;
  }
  .plan-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:8px;
  }
  .plan-list button{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    text-align:left;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fafafa;
    font-size:14px;
    color:var(--text);
  }
  .plan-list button .plan-price{
    font-weight:700;
    white-space:nowrap;
    margin-left:8px;
  }
  .plan-list button.selected{
    border-color:var(--primary);
    background:#fff3ec;
  }
  .plan-list button.selected .plan-price{
    color:var(--primary-dark);
  }
  .selected-summary{
    font-size:13px;
    color:var(--sub);
    margin-top:6px;
  }
  .selected-summary b{color:var(--text);}
  .modal-actions{
    display:flex;
    gap:8px;
    margin-top:8px;
  }
  .modal-actions button{
    flex:1;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    border:none;
  }
  .btn-cancel{background:#f0f0f2;color:var(--text);}
  .btn-save{background:var(--primary);color:#fff;font-weight:700;}
  .btn-save:disabled{background:#f0c9b3;color:#fff;}
  .dump-overlay{
    position:fixed;inset:0;
    background:#fff;
    z-index:30;
    padding:16px;
    overflow-y:auto;
    max-width:480px;
    margin:0 auto;
  }
  .dump-overlay.hidden{display:none;}
  .dump-overlay h2{font-size:16px;margin:0 0 12px;}
  .dump-overlay pre{
    white-space:pre-wrap;
    word-break:break-all;
    font-size:12px;
    background:#f7f7f8;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
  }
  .dump-overlay button{
    margin-bottom:12px;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    font-size:14px;
  }
</style>
</head>
<body>

<header>
  <h1 id="header-title">내 구독</h1>
</header>

<div class="view" id="view-home">
  <div id="banner-area"></div>
  <div class="total-card" id="total-card"></div>
  <div class="settings-section">
    <a href="#" class="settings-btn" id="dump-link">내 데이터 보기 (subs/events 덤프)</a>
    <button type="button" class="settings-btn danger" id="reset-btn">데이터 초기화</button>
  </div>
</div>

<div class="view hidden" id="view-subs">
  <main>
    <div class="list" id="list"></div>
  </main>
  <button class="fab" id="add-btn">+ 구독 추가</button>
</div>

<nav class="tabbar">
  <button type="button" class="tab-btn active" id="tab-home" data-view="view-home">
    <span class="tab-icon">🏠</span><span>홈</span>
  </button>
  <button type="button" class="tab-btn" id="tab-subs" data-view="view-subs">
    <span class="tab-icon">📋</span><span>구독</span>
  </button>
</nav>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2>구독 추가</h2>
    <div class="field">
      <label>서비스 검색</label>
      <input type="text" id="f-search" placeholder="예: 넷플릭스" autocomplete="off">
      <div class="suggest-list" id="suggest-list"></div>
    </div>
    <div class="field" id="plan-field" style="display:none;">
      <label>요금제 선택</label>
      <div class="plan-list" id="plan-list"></div>
    </div>
    <div class="field" id="summary-field" style="display:none;">
      <div class="selected-summary" id="selected-summary"></div>
    </div>
    <div class="field">
      <label>다음 결제일</label>
      <input type="date" id="f-date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-save" id="modal-save" disabled>저장</button>
    </div>
  </div>
</div>

<div class="dump-overlay hidden" id="dump-overlay">
  <button id="dump-close">← 닫기</button>
  <h2>subs</h2>
  <pre id="dump-subs"></pre>
  <h2>events</h2>
  <pre id="dump-events"></pre>
  <h2>lastOpen</h2>
  <pre id="dump-lastopen"></pre>
</div>

<script>
(function(){
  "use strict";

  // 대표 구독 카탈로그: 요금제(이름/금액/결제주기) + 해지·관리 URL (2026년 7월 기준 공식 정가)
  var SUB_CATALOG = [
    {

    },
    {
      name: "왓챠",
      cancelUrl: "https://watcha.com/settings/membership",
      plans: [
        { label: "베이직", amount: 7900, cycle: "monthly" },
        { label: "프리미엄", amount: 12900, cycle: "monthly" }
      ]
    },
    {
      name: "디즈니+",
      cancelUrl: "https://www.disneyplus.com/account/subscription",
      plans: [
        { label: "스탠다드", amount: 9900, cycle: "monthly" },
        { label: "프리미엄", amount: 13900, cycle: "monthly" }
      ]
    },
    {
      name: "스포티파이",
      cancelUrl: "https://www.spotify.com/kr-ko/account/subscription/",
      plans: [
        { label: "베이직", amount: 8690, cycle: "monthly" },
        { label: "개인", amount: 11990, cycle: "monthly" },
        { label: "듀오", amount: 17985, cycle: "monthly" },
        { label: "학생", amount: 6600, cycle: "monthly" }
      ]
    },
    {
      name: "챗지피티",
      cancelUrl: "https://chatgpt.com/#settings/Subscription",
      plans: [
        { label: "Plus", amount: 29000, cycle: "monthly" },
        { label: "Pro (5x)", amount: 159000, cycle: "monthly" },
        { label: "Pro (20x)", amount: 299000, cycle: "monthly" }
      ]
    },
    {
      name: "네이버플러스",
      cancelUrl: "https://nid.naver.com/membership/subscribe?m=checkCancel",
      plans: [
        { label: "월간", amount: 4900, cycle: "monthly" },
        { label: "연간(월 환산)", amount: 3900, cycle: "yearly" }
      ]
    },
    {
      name: "밀리의서재",
      cancelUrl: "https://www.millie.co.kr/v3/mymillie/subscribe",
      plans: [
        { label: "월간(웹)", amount: 11900, cycle: "monthly" },
        { label: "연간(월 환산)", amount: 9900, cycle: "yearly" }
      ]
    },
    {
      name: "애플뮤직",
      cancelUrl: "https://apps.apple.com/account/subscriptions",
      plans: [
        { label: "개인", amount: 8900, cycle: "monthly" },
        { label: "가족", amount: 13500, cycle: "monthly" }
      ]
    },
    {
      name: "리디셀렉트",
      cancelUrl: "https://select.ridibooks.com/mypage/subscribe",
      plans: [
        { label: "월정액", amount: 4900, cycle: "monthly" }
      ]
    }
  ];

  var LS_SUBS = "subs";
  var LS_EVENTS = "events";
  var LS_LASTOPEN = "lastOpen";

  function loadSubs(){
    try{ return JSON.parse(localStorage.getItem(LS_SUBS)) || []; }catch(e){ return []; }
  }
  function saveSubs(subs){
    localStorage.setItem(LS_SUBS, JSON.stringify(subs));
  }
  function loadEvents(){
    try{ return JSON.parse(localStorage.getItem(LS_EVENTS)) || []; }catch(e){ return []; }
  }
  function logEvent(type, subId){
    var events = loadEvents();
    events.push({ type: type, subId: subId, ts: new Date().toISOString() });
    localStorage.setItem(LS_EVENTS, JSON.stringify(events));
  }

  function todayStr(){
    var d = new Date();
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  }
  function pad(n){ return n < 10 ? "0"+n : ""+n; }

  function daysUntil(dateStr){
    var today = new Date(todayStr() + "T00:00:00");
    var target = new Date(dateStr + "T00:00:00");
    return Math.round((target - today) / 86400000);
  }

  function addCycle(dateStr, cycle){
    var parts = dateStr.split("-").map(Number);
    var y = parts[0], m = parts[1], d = parts[2];
    if(cycle === "yearly"){
      y += 1;
    } else {
      m += 1;
      if(m > 12){ m = 1; y += 1; }
    }
    // 말일 보정 (예: 1/31 + 1개월 -> 2월 마지막날)
    var lastDay = new Date(y, m, 0).getDate();
    if(d > lastDay) d = lastDay;
    return y + "-" + pad(m) + "-" + pad(d);
  }

  function rolloverPastDue(){
    var subs = loadSubs();
    var today = todayStr();
    var changed = false;
    subs.forEach(function(s){
      var guard = 0;
      while(s.nextPaymentDate < today && guard < 240){
        s.nextPaymentDate = addCycle(s.nextPaymentDate, s.cycle);
        changed = true;
        guard++;
      }
    });
    if(changed) saveSubs(subs);
    return subs;
  }

  function fmtAmount(n){
    return "₩" + Number(n).toLocaleString("ko-KR");
  }

  function uid(){
    return "s" + Date.now() + Math.random().toString(36).slice(2,8);
  }

  // ---------- 렌더링 ----------

  function render(){
    var subs = loadSubs().slice().sort(function(a,b){
      return a.nextPaymentDate.localeCompare(b.nextPaymentDate);
    });
    renderBanner(subs);
    renderTotal(subs);
    renderList(subs);
  }

  function monthlyAmount(s){
    return s.cycle === "yearly" ? s.amount / 12 : s.amount;
  }

  function renderTotal(subs){
    var card = document.getElementById("total-card");
    if(subs.length === 0){
      card.innerHTML =
        '<div class="total-label">월 예상 구독료</div>' +
        '<div class="total-amount">₩0</div>';
      return;
    }
    var monthly = subs.reduce(function(sum, s){ return sum + monthlyAmount(s); }, 0);
    var yearly = monthly * 12;
    card.innerHTML =
      '<div class="total-label">월 예상 구독료 (구독 ' + subs.length + '개)</div>' +
      '<div class="total-amount">' + fmtAmount(Math.round(monthly)) + '</div>' +
      '<div class="total-sub">연간 환산 ' + fmtAmount(Math.round(yearly)) + '</div>';
  }

  function renderBanner(subs){
    var area = document.getElementById("banner-area");
    area.innerHTML = "";
    var urgent = subs.filter(function(s){ return daysUntil(s.nextPaymentDate) <= 3; });
    if(urgent.length === 0) return;

    urgent.forEach(function(s){
      var d = daysUntil(s.nextPaymentDate);
      var ddayText = d <= 0 ? "D-day" : ("D-" + d);
      var box = document.createElement("div");
      box.className = "banner";
      box.innerHTML =
        '<div class="banner-title">결제 임박</div>' +
        '<div class="banner-row">' +
          '<span>' + escapeHtml(s.name) + ' 결제 ' + ddayText + ' · ' + fmtAmount(s.amount) + '</span>' +
        '</div>' +
        '<div class="banner-actions">' +
          '<button type="button" class="banner-cancel-btn" ' + (s.cancelUrl ? "" : "disabled") + '>해지하러 가기</button>' +
        '</div>' +
        '<div class="banner-helpful">' +
          '<span>미리 알아서 도움됐어요?</span>' +
          '<button type="button" class="helpful-yes">예</button>' +
          '<button type="button" class="helpful-no">아니오</button>' +
        '</div>';

      box.querySelector(".banner-cancel-btn").addEventListener("click", function(){
        if(!s.cancelUrl) return;
        window.open(s.cancelUrl, "_blank");
        logEvent("cancel_click", s.id);
      });
      box.querySelector(".helpful-yes").addEventListener("click", function(){
        logEvent("helpful_yes", s.id);
        box.querySelector(".banner-helpful").innerHTML = "<span>응답 감사합니다</span>";
      });
      box.querySelector(".helpful-no").addEventListener("click", function(){
        logEvent("helpful_no", s.id);
        box.querySelector(".banner-helpful").innerHTML = "<span>응답 감사합니다</span>";
      });

      area.appendChild(box);
    });
  }

  function renderList(subs){
    var list = document.getElementById("list");
    list.innerHTML = "";

    if(subs.length === 0){
      list.innerHTML = '<div class="empty">아직 등록된 구독이 없어요.<p>+ 구독 추가로 시작해보세요.</p></div>';
      return;
    }

    subs.forEach(function(s){
      var d = daysUntil(s.nextPaymentDate);
      var isUrgent = d <= 3;
      var ddayText = d < 0 ? ("D+" + Math.abs(d)) : (d === 0 ? "D-day" : ("D-" + d));

      var card = document.createElement("div");
      card.className = "card" + (isUrgent ? " urgent" : "");
      card.innerHTML =
        '<div class="card-top">' +
          '<div>' +
            '<div class="card-name">' + escapeHtml(s.name) + '</div>' +
            '<div class="card-amount">' + fmtAmount(s.amount) + '</div>' +
          '</div>' +
          '<div class="dday' + (isUrgent ? ' urgent' : '') + '">' + ddayText + '</div>' +
        '</div>' +
        '<div class="card-bottom">' +
          '<span class="cycle-tag">' + (s.cycle === "yearly" ? "매년" : "매월") + ' · ' + s.nextPaymentDate + '</span>' +
          '<button type="button" class="cancel-btn' + (s.cancelUrl ? " enabled" : "") + '" ' + (s.cancelUrl ? "" : "disabled") + '>해지하러 가기</button>' +
        '</div>';

      card.querySelector(".cancel-btn").addEventListener("click", function(){
        if(!s.cancelUrl) return;
        window.open(s.cancelUrl, "_blank");
        logEvent("cancel_click", s.id);
      });

      list.appendChild(card);
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  // ---------- 모달 ----------

  var modalOverlay = document.getElementById("modal-overlay");
  var selectedService = null; // SUB_CATALOG 항목
  var selectedPlan = null;    // { label, amount, cycle }

  function openModal(){
    document.getElementById("f-search").value = "";
    document.getElementById("f-date").value = todayStr();
    selectedService = null;
    selectedPlan = null;
    document.getElementById("plan-field").style.display = "none";
    document.getElementById("summary-field").style.display = "none";
    document.getElementById("plan-list").innerHTML = "";
    updateSaveEnabled();
    renderSuggestList("");
    modalOverlay.classList.remove("hidden");
    document.getElementById("f-search").focus();
  }
  function closeModal(){
    modalOverlay.classList.add("hidden");
  }

  function renderSuggestList(query){
    var box = document.getElementById("suggest-list");
    box.innerHTML = "";
    var q = query.trim().toLowerCase();
    var matches = SUB_CATALOG.filter(function(s){
      return !q || s.name.toLowerCase().indexOf(q) !== -1;
    });

    if(matches.length === 0){
      box.innerHTML = '<div class="suggest-empty">일치하는 구독 서비스가 없어요.</div>';
      return;
    }

    matches.forEach(function(service){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = service.name;
      if(selectedService === service) btn.classList.add("selected");
      btn.addEventListener("click", function(){
        selectService(service);
      });
      box.appendChild(btn);
    });
  }

  function selectService(service){
    selectedService = service;
    selectedPlan = null;
    document.getElementById("f-search").value = service.name;
    renderSuggestList(service.name);
    renderPlanList(service);
    document.getElementById("plan-field").style.display = "block";
    document.getElementById("summary-field").style.display = "none";
    updateSaveEnabled();
  }

  function renderPlanList(service){
    var box = document.getElementById("plan-list");
    box.innerHTML = "";
    service.plans.forEach(function(plan){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.innerHTML = '<span>' + escapeHtml(plan.label) + '</span>' +
        '<span class="plan-price">' + fmtAmount(plan.amount) + ' / ' + (plan.cycle === "yearly" ? "년" : "월") + '</span>';
      btn.addEventListener("click", function(){
        selectPlan(plan, btn);
      });
      box.appendChild(btn);
    });
  }

  function selectPlan(plan, btnEl){
    selectedPlan = plan;
    Array.prototype.forEach.call(document.querySelectorAll("#plan-list button"), function(b){
      b.classList.remove("selected");
    });
    btnEl.classList.add("selected");

    var summaryField = document.getElementById("summary-field");
    summaryField.style.display = "block";
    document.getElementById("selected-summary").innerHTML =
      '선택됨: <b>' + escapeHtml(selectedService.name) + ' · ' + escapeHtml(plan.label) + '</b> · ' +
      fmtAmount(plan.amount) + ' (' + (plan.cycle === "yearly" ? "매년" : "매월") + ')';

    updateSaveEnabled();
  }

  function updateSaveEnabled(){
    var date = document.getElementById("f-date").value;
    document.getElementById("modal-save").disabled = !(selectedService && selectedPlan && date);
  }

  document.getElementById("add-btn").addEventListener("click", openModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", function(e){
    if(e.target === modalOverlay) closeModal();
  });

  document.getElementById("f-search").addEventListener("input", function(){
    if(selectedService && this.value.trim() !== selectedService.name){
      selectedService = null;
      selectedPlan = null;
      document.getElementById("plan-field").style.display = "none";
      document.getElementById("summary-field").style.display = "none";
      updateSaveEnabled();
    }
    renderSuggestList(this.value);
  });

  document.getElementById("f-date").addEventListener("change", updateSaveEnabled);

  document.getElementById("modal-save").addEventListener("click", function(){
    var date = document.getElementById("f-date").value;
    if(!selectedService || !selectedPlan || !date) return;

    var subs = loadSubs();
    var sub = {
      id: uid(),
      name: selectedService.name,
      amount: selectedPlan.amount,
      cycle: selectedPlan.cycle,
      nextPaymentDate: date,
      cancelUrl: selectedService.cancelUrl,
      createdAt: new Date().toISOString()
    };
    subs.push(sub);
    saveSubs(subs);
    logEvent("add", sub.id);

    closeModal();
    render();
  });

  // ---------- 데이터 덤프 ----------

  var dumpOverlay = document.getElementById("dump-overlay");
  document.getElementById("dump-link").addEventListener("click", function(e){
    e.preventDefault();
    document.getElementById("dump-subs").textContent = JSON.stringify(loadSubs(), null, 2);
    document.getElementById("dump-events").textContent = JSON.stringify(loadEvents(), null, 2);
    document.getElementById("dump-lastopen").textContent = localStorage.getItem(LS_LASTOPEN) || "(none)";
    dumpOverlay.classList.remove("hidden");
  });
  document.getElementById("dump-close").addEventListener("click", function(){
    dumpOverlay.classList.add("hidden");
  });

  document.getElementById("reset-btn").addEventListener("click", function(){
    if(!confirm("모든 구독·기록 데이터를 삭제할까요? 되돌릴 수 없어요.")) return;
    localStorage.removeItem(LS_SUBS);
    localStorage.removeItem(LS_EVENTS);
    localStorage.removeItem(LS_LASTOPEN);
    render();
    alert("데이터가 초기화됐어요.");
  });

  // ---------- 탭 전환 ----------

  var tabButtons = document.querySelectorAll(".tab-btn");
  function switchTab(viewId){
    document.querySelectorAll(".view").forEach(function(v){
      v.classList.toggle("hidden", v.id !== viewId);
    });
    tabButtons.forEach(function(btn){
      btn.classList.toggle("active", btn.dataset.view === viewId);
    });
    document.getElementById("header-title").textContent = viewId === "view-subs" ? "구독 목록" : "내 구독";
  }
  tabButtons.forEach(function(btn){
    btn.addEventListener("click", function(){ switchTab(btn.dataset.view); });
  });

  // ---------- 초기화 ----------

  function init(){
    rolloverPastDue();
    logEvent("open", null);
    localStorage.setItem(LS_LASTOPEN, new Date().toISOString());
    render();
  }

  init();
})();
</script>
</body>
</html>
